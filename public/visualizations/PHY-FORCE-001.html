<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force & Motion (F=ma)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .widget-container {
            width: 100%;
            max-width: 400px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #007bff;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 24px;
        }
        .explanation {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }
        canvas {
            border: 1px solid #ddd;
            background-color: #eef2f7;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #007bff;
        }
        .value-display {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
        }
        .formula {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            color: #28a745;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <h1>Newton's Second Law: F = ma</h1>
        <div class="explanation">
            Explore how applied force and mass affect an object's acceleration.
            Newton's Second Law states that the acceleration of an object is directly proportional to the net force acting on it and inversely proportional to its mass.
        </div>

        <canvas id="motionCanvas" width="360" height="200"></canvas>

        <div class="controls">
            <div class="control-group">
                <label for="forceSlider">Applied Force (N):</label>
                <div class="value-display">
                    <span id="forceValue">0</span>
                    <span>100</span>
                </div>
                <input type="range" id="forceSlider" min="0" max="100" value="50">
            </div>

            <div class="control-group">
                <label for="massSlider">Mass (kg):</label>
                <div class="value-display">
                    <span id="massValue">1</span>
                    <span>10</span>
                </div>
                <input type="range" id="massSlider" min="1" max="10" value="5">
            </div>
        </div>

        <div class="formula">F = ma</div>
    </div>

    <script>
        // --- Canvas Setup ---
        const canvas = document.getElementById('motionCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;
        const ballRadius = 15;
        const groundHeight = 20;

        // --- State Variables ---
        let ballX = ballRadius; // Initial position
        let ballVelocity = 0;
        let ballAcceleration = 0;
        let appliedForce = 50; // Initial force
        let mass = 5; // Initial mass
        let isSimulating = false; // Flag to control animation

        // --- UI Elements ---
        const forceSlider = document.getElementById('forceSlider');
        const massSlider = document.getElementById('massSlider');
        const forceValueDisplay = document.getElementById('forceValue');
        const massValueDisplay = document.getElementById('massValue');

        // --- Event Listeners ---
        forceSlider.addEventListener('input', (e) => {
            appliedForce = parseInt(e.target.value);
            forceValueDisplay.textContent = appliedForce;
            // Recalculate acceleration if simulation is running
            if (isSimulating) {
                updateAcceleration();
            }
        });

        massSlider.addEventListener('input', (e) => {
            mass = parseInt(e.target.value);
            massValueDisplay.textContent = mass;
            // Recalculate acceleration if simulation is running
            if (isSimulating) {
                updateAcceleration();
            }
        });

        // --- Animation Logic ---

        // Function to calculate acceleration based on F=ma
        function updateAcceleration() {
            // F = ma => a = F/m
            ballAcceleration = appliedForce / mass;
        }

        // Function to draw the scene
        function draw() {
            // Clear the canvas
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            // Draw the ground
            ctx.fillStyle = '#777';
            ctx.fillRect(0, canvasHeight - groundHeight, canvasWidth, groundHeight);

            // Draw the ball
            ctx.fillStyle = '#007bff';
            ctx.beginPath();
            ctx.arc(ballX, canvasHeight - groundHeight - ballRadius, ballRadius, 0, Math.PI * 2);
            ctx.fill();

            // Draw force arrow (optional, for visual cue)
            if (appliedForce > 0) {
                ctx.fillStyle = '#28a745'; // Green for force
                ctx.beginPath();
                // Arrow points from left to right, proportional to force
                const arrowLength = Math.min(canvasWidth / 2, appliedForce * 2);
                const arrowHeadSize = 8;
                const arrowStartX = ballRadius + 5;
                const arrowEndX = arrowStartX + arrowLength;
                const arrowY = canvasHeight - groundHeight - ballRadius - ballRadius - 5; // Above the ball

                ctx.moveTo(arrowStartX, arrowY);
                ctx.lineTo(arrowEndX, arrowY);
                ctx.lineTo(arrowEndX - arrowHeadSize, arrowY - arrowHeadSize / 2);
                ctx.lineTo(arrowEndX, arrowY);
                ctx.lineTo(arrowEndX - arrowHeadSize, arrowY + arrowHeadSize / 2);
                ctx.fill();

                // Add text for force value near arrow
                ctx.font = '12px Arial';
                ctx.fillStyle = '#333';
                ctx.fillText(`${appliedForce} N`, arrowStartX + arrowLength / 2 - 15, arrowY - 15);
            }
        }

        // Function to update ball's position and velocity
        function update() {
            if (!isSimulating) return; // Stop if not simulating

            // Update velocity based on acceleration
            ballVelocity += ballAcceleration;

            // Update position based on velocity
            ballX += ballVelocity;

            // Prevent ball from going off-screen to the right (and simulate bouncing off walls if needed)
            if (ballX + ballRadius > canvasWidth) {
                ballX = canvasWidth - ballRadius;
                ballVelocity *= -0.5; // Simple bounce with energy loss
            }
            // Prevent ball from going off-screen to the left
            if (ballX - ballRadius < 0) {
                ballX = ballRadius;
                ballVelocity *= -0.5; // Simple bounce with energy loss
            }

            // Keep ball on the ground
            if (canvasHeight - groundHeight - ballRadius - ballVelocity < 0) {
                ballVelocity = 0; // Stop if it hits the ground
                ballX = canvasWidth / 2; // Reset to center on ground
                // Optionally stop simulation when it hits the ground and stops moving
                // isSimulating = false;
            }
        }

        // The main animation loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop); // Request the next frame
        }

        // --- Initialization ---
        // Calculate initial acceleration
        updateAcceleration();
        // Draw the initial state
        draw();

        // Start the simulation loop
        isSimulating = true;
        gameLoop();

        // --- Responsiveness Handling ---
        // Adjust canvas size if container width changes.
        // For this fixed-width widget, this might not be strictly necessary,
        // but good practice for responsiveness.
        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const containerWidth = entry.contentRect.width;
                const scale = containerWidth / 400; // Original width of widget-container
                canvas.style.width = `${containerWidth}px`;
                canvas.style.height = `${200 * scale}px`;
                // Re-draw to fit new size if needed, or let CSS handle scaling
            }
        });
        resizeObserver.observe(document.querySelector('.widget-container'));

    </script>
</body>
</html>
