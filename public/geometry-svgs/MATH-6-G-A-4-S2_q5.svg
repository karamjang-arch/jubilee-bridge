<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Cylindrical container representation -->
  <!-- Base ellipse -->
  <ellipse cx="200" cy="220" rx="80" ry="20" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <!-- Top ellipse -->
  <ellipse cx="200" cy="70" rx="80" ry="20" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <!-- Side rectangle (unrolled surface) -->
  <rect x="120" y="70" width="160" height="150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Labels -->
  <!-- Radius label for the base -->
  <line x1="200" y1="220" x2="280" y2="220" stroke="black" stroke-width="2"/>
  <line x1="200" y1="220" x2="200" y2="230" stroke="black" stroke-width="2"/>
  <line x1="280" y1="220" x2="280" y2="230" stroke="black" stroke-width="2"/>
  <text x="240" y="245" text-anchor="middle" font-size="14">10 cm (r)</text>

  <!-- Height label for the side -->
  <line x1="280" y1="70" x2="290" y2="70" stroke="black" stroke-width="2"/>
  <line x1="280" y1="220" x2="290" y2="220" stroke="black" stroke-width="2"/>
  <line x1="290" y1="70" x2="290" y2="220" stroke="black" stroke-width="2"/>
  <text x="305" y="145" text-anchor="middle" font-size="14">25 cm (h)</text>

  <!-- Circumference label for the unrolled surface -->
  <line x1="120" y1="50" x2="280" y2="50" stroke="black" stroke-width="2"/>
  <text x="200" y="40" text-anchor="middle" font-size="14">2πr = 20π cm</text>

</svg>