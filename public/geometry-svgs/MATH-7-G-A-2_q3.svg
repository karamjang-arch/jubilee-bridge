<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 100)">
    <!-- Vertices of the triangle -->
    <polygon points="0,0 120,0 0,50" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Right angle marker -->
    <path d="M 0 0 L 10 0 L 10 10 Z" fill="black" stroke="black" stroke-width="1"/>

    <!-- Side labels -->
    <!-- Side 1: 5 inches -->
    <text x="-20" y="25" text-anchor="end" font-size="14" dy="0.35em">5 in</text>
    <!-- Side 2: 12 inches -->
    <text x="60" y="-10" text-anchor="middle" font-size="14">12 in</text>
    <!-- Side 3: 13 inches -->
    <text x="60" y="75" text-anchor="middle" font-size="14">13 in</text>
  </g>
</svg>