<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 150) rotate(-45)">
    <polygon points="0,0 150,0 0,150" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    
    <!-- Right angle marker -->
    <path d="M0 0 L150 0 L150 150" stroke="black" stroke-width="2" fill="none" />
    <path d="M0 0 L0 150 L150 150" stroke="black" stroke-width="2" fill="none" />
    <rect x="145" y="145" width="5" height="5" fill="black" stroke="black" stroke-width="0"/>

    <!-- Labels -->
    <text x="75" y="-10" text-anchor="middle" font-size="16" fill="black">90°</text>
    <text x="160" y="75" text-anchor="start" font-size="16" fill="black">45°</text>
    <text x="-10" y="75" text-anchor="end" font-size="16" fill="black">45°</text>
  </g>
</svg>