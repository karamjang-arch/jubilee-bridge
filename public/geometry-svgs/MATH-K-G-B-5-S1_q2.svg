<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <g transform="translate(80, 100)">
    <!-- Three squares arranged side-by-side -->
    <rect x="0" y="0" width="80" height="80" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <rect x="80" y="0" width="80" height="80" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <rect x="160" y="0" width="80" height="80" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- The resulting rectangle -->
    <rect x="0" y="0" width="240" height="80" fill="none" stroke="black" stroke-width="2"/>

    <!-- Side length labels for individual squares -->
    <text x="40" y="-10" text-anchor="middle" font-size="14">4 cm</text>
    <text x="120" y="-10" text-anchor="middle" font-size="14">4 cm</text>
    <text x="200" y="-10" text-anchor="middle" font-size="14">4 cm</text>

    <!-- Total width label -->
    <text x="120" y="-30" text-anchor="middle" font-size="16">12 cm</text>
    <line x1="0" y1="-20" x2="240" y2="-20" stroke="black" stroke-width="2"/>

    <!-- Height label -->
    <text x="-10" y="40" text-anchor="end" font-size="16" dominant-baseline="middle">4 cm</text>
    <line x1="-20" y1="0" x2="-20" y2="80" stroke="black" stroke-width="2"/>

    <!-- Equal side marks for squares -->
    <line x1="10" y1="10" x2="10" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="10" y1="10" x2="20" y2="10" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="10" x2="90" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="10" x2="100" y2="10" stroke="black" stroke-width="1.5"/>
    <line x1="170" y1="10" x2="170" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="170" y1="10" x2="180" y2="10" stroke="black" stroke-width="1.5"/>

    <line x1="70" y1="10" x2="70" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="70" y1="10" x2="60" y2="10" stroke="black" stroke-width="1.5"/>
    <line x1="150" y1="10" x2="150" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="150" y1="10" x2="140" y2="10" stroke="black" stroke-width="1.5"/>
    <line x1="230" y1="10" x2="230" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="230" y1="10" x2="220" y2="10" stroke="black" stroke-width="1.5"/>

  </g>
</svg>