<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Original Square -->
  <g id="original-square" transform="translate(100, 100)">
    <rect x="0" y="0" width="70" height="70" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Side length label -->
    <text x="35" y="-10" text-anchor="middle" font-size="14">7 inches</text>
    <!-- Equal side marks -->
    <line x1="5" y1="10" x2="5" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="10" y1="5" x2="20" y2="5" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="10" x2="60" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="10" y1="60" x2="20" y2="60" stroke="black" stroke-width="1.5"/>
    <line x1="50" y1="60" x2="40" y2="60" stroke="black" stroke-width="1.5"/>
    <line x1="60" y1="50" x2="60" y2="40" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Arrow indicating increase -->
  <line x1="180" y1="135" x2="220" y2="135" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="155" text-anchor="middle" font-size="14"> + 3 inches</text>

  <!-- New Square -->
  <g id="new-square" transform="translate(100, 180)">
    <rect x="0" y="0" width="100" height="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Side length label -->
    <text x="50" y="-10" text-anchor="middle" font-size="14">10 inches</text>
    <!-- Equal side marks -->
    <line x1="5" y1="10" x2="5" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="10" y1="5" x2="20" y2="5" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="10" x2="90" y2="20" stroke="black" stroke-width="1.5"/>
    <line x1="10" y1="90" x2="20" y2="90" stroke="black" stroke-width="1.5"/>
    <line x1="80" y1="90" x2="70" y2="90" stroke="black" stroke-width="1.5"/>
    <line x1="90" y1="80" x2="90" y2="70" stroke="black" stroke-width="1.5"/>
  </g>

  <!-- Perimeter label for new square -->
  <text x="200" y="290" text-anchor="middle" font-size="14">Perimeter = 40 inches</text>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0 10 3.5 0 7" fill="black"/>
    </marker>
  </defs>
</svg>