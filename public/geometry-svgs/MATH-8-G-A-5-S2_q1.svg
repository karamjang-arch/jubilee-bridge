<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Triangle ABC -->
  <g transform="translate(50, 150)">
    <polygon points="0,0 100,0 50,-86.6" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <text x="50" y="-95" text-anchor="middle" font-size="14">Triangle ABC</text>
    <text x="25" y="15" text-anchor="middle" font-size="14">50°</text>
    <text x="75" y="15" text-anchor="middle" font-size="14">70°</text>
    <text x="50" y="-70" text-anchor="middle" font-size="14">60°</text>
  </g>

  <!-- Triangle XYZ -->
  <g transform="translate(250, 150)">
    <polygon points="0,0 100,0 50,-86.6" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <text x="50" y="-95" text-anchor="middle" font-size="14">Triangle XYZ</text>
    <text x="25" y="15" text-anchor="middle" font-size="14">50°</text>
    <text x="75" y="15" text-anchor="middle" font-size="14">60°</text>
    <text x="50" y="-70" text-anchor="middle" font-size="14">70°</text>
  </g>
</svg>