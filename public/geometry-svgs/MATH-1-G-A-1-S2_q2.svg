<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="100" y="75" width="200" height="75" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Length labels -->
  <text x="200" y="65" text-anchor="middle" font-size="16">12 units</text>
  <text x="200" y="160" text-anchor="middle" font-size="16">12 units</text>

  <!-- Width labels -->
  <text x="90" y="112.5" text-anchor="end" font-size="16" dominant-baseline="middle">5 units</text>
  <text x="310" y="112.5" text-anchor="start" font-size="16" dominant-baseline="middle">5 units</text>

  <!-- Equal side marks for length -->
  <line x1="100" y1="75" x2="100" y2="85" stroke="black" stroke-width="2"/>
  <line x1="300" y1="75" x2="300" y2="85" stroke="black" stroke-width="2"/>

  <!-- Equal side marks for width -->
  <line x1="95" y1="75" x2="105" y2="75" stroke="black" stroke-width="2"/>
  <line x1="95" y1="150" x2="105" y2="150" stroke="black" stroke-width="2"/>
</svg>