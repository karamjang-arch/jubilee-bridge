<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>

  <g transform="translate(100, 75)">
    <!-- Blueprint Rectangle -->
    <rect id="blueprint-rect" x="0" y="0" width="200" height="125" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Blueprint Dimensions -->
    <text x="100" y="-10" text-anchor="middle" font-size="16" fill="black">Blueprint Dimensions</text>

    <!-- Width Label -->
    <text x="100" y="140" text-anchor="middle" font-size="14" fill="black">5 inches</text>
    <line x1="0" y1="130" x2="200" y2="130" stroke="black" stroke-width="2"/>
    <line x1="0" y1="125" x2="0" y2="135" stroke="black" stroke-width="2"/>
    <line x1="200" y1="125" x2="200" y2="135" stroke="black" stroke-width="2"/>

    <!-- Height Label -->
    <text x="-20" y="62.5" text-anchor="end" font-size="14" fill="black" dominant-baseline="middle" transform="rotate(-90, -20, 62.5)">8 inches</text>
    <line x1="-10" y1="0" x2="-20" y2="125" stroke="black" stroke-width="2"/>
    <line x1="-15" y1="0" x2="-5" y2="0" stroke="black" stroke-width="2"/>
    <line x1="-15" y1="125" x2="-5" y2="125" stroke="black" stroke-width="2"/>

    <!-- Scale Information -->
    <text x="100" y="250" text-anchor="middle" font-size="14" fill="black">Scale: 1/4 inch = 2 feet</text>

    <!-- Actual Dimensions Calculation (for visualization, not drawn) -->
    <!-- Width: 5 inches * (2 feet / 0.25 inches) = 5 * 8 = 40 feet -->
    <!-- Height: 8 inches * (2 feet / 0.25 inches) = 8 * 8 = 64 feet -->
    <!-- Area: 40 feet * 64 feet = 2560 sq ft -->

    <text x="100" y="275" text-anchor="middle" font-size="14" fill="black">Actual Area = 2560 sq ft</text>
  </g>
</svg>