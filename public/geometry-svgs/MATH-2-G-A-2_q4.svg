<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <g transform="translate(80, 50)">
    <!-- Cake rectangle -->
    <rect x="0" y="0" width="240" height="160" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Horizontal measurement label -->
    <text x="120" y="-10" text-anchor="middle" font-size="16" fill="black">14 inches</text>
    <line x1="0" y1="-5" x2="240" y2="-5" stroke="black" stroke-width="2"/>
    <line x1="0" y1="-15" x2="0" y2="5" stroke="black" stroke-width="2"/>
    <line x1="240" y1="-15" x2="240" y2="5" stroke="black" stroke-width="2"/>

    <!-- Vertical measurement label -->
    <text x="250" y="80" text-anchor="middle" font-size="16" fill="black" transform="rotate(-90, 250, 80)">10 inches</text>
    <line x1="245" y1="0" x2="245" y2="160" stroke="black" stroke-width="2"/>
    <line x1="235" y1="0" x2="255" y2="0" stroke="black" stroke-width="2"/>
    <line x1="235" y1="160" x2="255" y2="160" stroke="black" stroke-width="2"/>

    <!-- Grid lines for 2x2 squares -->
    <line x1="0" y1="20" x2="240" y2="20" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="0" y1="40" x2="240" y2="40" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="0" y1="60" x2="240" y2="60" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="0" y1="80" x2="240" y2="80" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="0" y1="100" x2="240" y2="100" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="0" y1="120" x2="240" y2="120" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="0" y1="140" x2="240" y2="140" stroke="gray" stroke-dasharray="4 2"/>

    <line x1="20" y1="0" x2="20" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="40" y1="0" x2="40" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="60" y1="0" x2="60" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="80" y1="0" x2="80" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="100" y1="0" x2="100" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="120" y1="0" x2="120" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="140" y1="0" x2="140" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="160" y1="0" x2="160" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="180" y1="0" x2="180" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="200" y1="0" x2="200" y2="160" stroke="gray" stroke-dasharray="4 2"/>
    <line x1="220" y1="0" x2="220" y2="160" stroke="gray" stroke-dasharray="4 2"/>

    <!-- Label for square size -->
    <text x="20" y="175" text-anchor="middle" font-size="14" fill="black">2x2 inch squares</text>
  </g>

  <!-- Question text -->
  <text x="200" y="270" text-anchor="middle" font-size="16" fill="black">How many 2x2 inch squares fit?</text>
</svg>