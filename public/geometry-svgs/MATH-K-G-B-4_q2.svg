<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="100" y="100" width="100" height="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Equal side marks -->
  <line x1="100" y1="100" x2="100" y2="110" stroke="black" stroke-width="2"/>
  <line x1="100" y1="120" x2="100" y2="130" stroke="black" stroke-width="2"/>
  <line x1="100" y1="140" x2="100" y2="150" stroke="black" stroke-width="2"/>
  <line x1="100" y1="160" x2="100" y2="170" stroke="black" stroke-width="2"/>

  <line x1="100" y1="100" x2="110" y2="100" stroke="black" stroke-width="2"/>
  <line x1="120" y1="100" x2="130" y2="100" stroke="black" stroke-width="2"/>
  <line x1="140" y1="100" x2="150" y2="100" stroke="black" stroke-width="2"/>
  <line x1="160" y1="100" x2="170" y2="100" stroke="black" stroke-width="2"/>

  <line x1="200" y1="100" x2="200" y2="110" stroke="black" stroke-width="2"/>
  <line x1="200" y1="120" x2="200" y2="130" stroke="black" stroke-width="2"/>
  <line x1="200" y1="140" x2="200" y2="150" stroke="black" stroke-width="2"/>
  <line x1="200" y1="160" x2="200" y2="170" stroke="black" stroke-width="2"/>

  <line x1="100" y1="200" x2="110" y2="200" stroke="black" stroke-width="2"/>
  <line x1="120" y1="200" x2="130" y2="200" stroke="black" stroke-width="2"/>
  <line x1="140" y1="200" x2="150" y2="200" stroke="black" stroke-width="2"/>
  <line x1="160" y1="200" x2="170" y2="200" stroke="black" stroke-width="2"/>

  <!-- Perimeter label -->
  <text x="150" y="230" text-anchor="middle" font-size="16">Perimeter = 24 inches</text>

  <!-- Side length label -->
  <text x="50" y="150" text-anchor="end" font-size="16" transform="rotate(-90 50 150)">Side = 6 inches</text>
  <text x="150" y="250" text-anchor="middle" font-size="16">Side = 6 inches</text>

  <!-- Area label (implied, not explicitly drawn as a value) -->
  <text x="250" y="150" text-anchor="start" font-size="16">Area = ?</text>
</svg>