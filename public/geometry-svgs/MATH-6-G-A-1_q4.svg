<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(200, 150)">
    <!-- Regular Hexagon -->
    <polygon
      points="100,0 50,86.6 -50,86.6 -100,0 -50,-86.6 50,-86.6"
      fill="#e3f2fd"
      stroke="black"
      stroke-width="2"
    />

    <!-- Equilateral Triangles (for visualization) -->
    <polygon points="0,0 100,0 50,86.6" fill="none" stroke="gray" stroke-dasharray="4"/>
    <polygon points="0,0 50,86.6 -50,86.6" fill="none" stroke="gray" stroke-dasharray="4"/>
    <polygon points="0,0 -50,86.6 -100,0" fill="none" stroke="gray" stroke-dasharray="4"/>
    <polygon points="0,0 -100,0 -50,-86.6" fill="none" stroke="gray" stroke-dasharray="4"/>
    <polygon points="0,0 -50,-86.6 50,-86.6" fill="none" stroke="gray" stroke-dasharray="4"/>
    <polygon points="0,0 50,-86.6 100,0" fill="none" stroke="gray" stroke-dasharray="4"/>

    <!-- Right angle marker for one triangle -->
    <path d="M 50 0 L 50 10 L 40 10 Z" fill="black" stroke="black" stroke-width="1"/>

    <!-- Side length label -->
    <text x="75" y="-10" text-anchor="middle" font-size="14" fill="black">10 ft</text>
    <line x1="50" y1="0" x2="100" y2="0" stroke="black" stroke-width="2"/>

    <!-- Height label -->
    <text x="120" y="43.3" text-anchor="start" font-size="14" fill="black">8.66 ft</text>
    <line x1="100" y1="0" x2="100" y2="86.6" stroke="black" stroke-width="2" stroke-dasharray="2"/>

  </g>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-size="18" font-weight="bold">Garden Plot Area</text>
</svg>