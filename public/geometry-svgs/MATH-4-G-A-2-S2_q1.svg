<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 150) rotate(-15)">
    <!-- Vertices of the triangle -->
    <polygon points="0,0 150,0 75,-100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Angle labels -->
    <text x="-20" y="10" font-size="14" fill="black" transform="rotate(-15)">40°</text>
    <text x="150" y="10" font-size="14" fill="black" transform="rotate(-15)">50°</text>
    <text x="75" y="-115" font-size="14" fill="black" text-anchor="middle" transform="rotate(-15)">90°</text>
  </g>

  <!-- Explanation text -->
  <text x="200" y="30" font-size="16" text-anchor="middle" fill="black">Triangle Angle Classification</text>
  <text x="200" y="50" font-size="14" text-anchor="middle" fill="black">Given angles: 40° and 50°</text>
  <text x="200" y="70" font-size="14" text-anchor="middle" fill="black">Sum of given angles = 40° + 50° = 90°</text>
  <text x="200" y="90" font-size="14" text-anchor="middle" fill="black">Third angle = 180° - 90° = 90°</text>
  <text x="200" y="110" font-size="14" text-anchor="middle" fill="black">A triangle with a 90° angle is a right triangle.</text>
</svg>