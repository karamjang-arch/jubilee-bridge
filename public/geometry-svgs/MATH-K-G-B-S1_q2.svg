<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Original Rectangle -->
  <rect x="80" y="70" width="120" height="70" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-size="14" fill="black">12 cm</text>
  <text x="40" y="105" text-anchor="middle" font-size="14" fill="black" transform="rotate(-90 40 105)">7 cm</text>

  <!-- New Rectangle -->
  <rect x="180" y="100" width="150" height="50" fill="#cce5ff" stroke="black" stroke-width="2"/>
  <text x="255" y="125" text-anchor="middle" font-size="14" fill="black">15 cm</text>
  <text x="160" y="125" text-anchor="middle" font-size="14" fill="black" transform="rotate(-90 160 125)">5 cm</text>

  <!-- Labels for changes -->
  <line x1="200" y1="70" x2="200" y2="100" stroke="blue" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="210" y="85" font-size="12" fill="blue">+3 cm</text>

  <line x1="80" y1="140" x2="180" y2="140" stroke="red" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="130" y="155" font-size="12" fill="red">-2 cm</text>

  <!-- Problem statement text -->
  <text x="200" y="250" text-anchor="middle" font-size="14" fill="black">Original: L=12, W=7</text>
  <text x="200" y="270" text-anchor="middle" font-size="14" fill="black">New: L=12+3=15, W=7-2=5</text>
  <text x="200" y="290" text-anchor="middle" font-size="14" fill="black">Perimeter = 2*(15+5) = 40 cm</text>

</svg>