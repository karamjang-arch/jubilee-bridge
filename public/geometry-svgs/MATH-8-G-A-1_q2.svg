<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Original Triangle -->
  <polygon points="100,100 160,160 120,180" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <circle cx="100" cy="100" r="3" fill="black"/>
  <text x="90" y="95" font-size="14" text-anchor="end">A(1, 2)</text>
  <circle cx="160" cy="160" r="3" fill="black"/>
  <text x="170" y="165" font-size="14" text-anchor="start">B(4, 5)</text>
  <circle cx="120" cy="180" r="3" fill="black"/>
  <text x="110" y="195" font-size="14" text-anchor="end">C(2, 6)</text>

  <!-- Translation Arrow -->
  <line x1="200" y1="130" x2="260" y2="130" stroke="blue" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="120" text-anchor="middle" font-size="14" fill="blue">3 right</text>
  <line x1="230" y1="130" x2="230" y2="170" stroke="blue" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="150" text-anchor="start" font-size="14" fill="blue">2 down</text>

  <!-- New Triangle -->
  <polygon points="190,120 250,180 210,200" fill="#c5e1a5" stroke="black" stroke-width="2"/>
  <circle cx="190" cy="120" r="3" fill="black"/>
  <text x="180" y="115" font-size="14" text-anchor="end">A'(4, 0)</text>
  <circle cx="250" cy="180" r="3" fill="black"/>
  <text x="260" y="185" font-size="14" text-anchor="start">B'(7, 3)</text>
  <circle cx="210" cy="200" r="3" fill="black"/>
  <text x="200" y="215" font-size="14" text-anchor="end">C'(5, 4)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="blue"/>
    </marker>
  </defs>
</svg>