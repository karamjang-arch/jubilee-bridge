<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(200, 150)">
    <!-- Circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="black" stroke-width="2"/>

    <!-- Sector -->
    <path d="M 0 0 L 100 0 A 100 100 0 0 1 80.9017 58.7785 L 0 0 Z" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Radius 1 -->
    <line x1="0" y1="0" x2="100" y2="0" stroke="black" stroke-width="2"/>
    <text x="115" y="5" text-anchor="start" font-size="14" fill="black">5 cm</text>

    <!-- Radius 2 -->
    <line x1="0" y1="0" x2="80.9017" y2="58.7785" stroke="black" stroke-width="2"/>
    <text x="90" y="75" text-anchor="start" font-size="14" fill="black">5 cm</text>

    <!-- Arc -->
    <path d="M 100 0 A 100 100 0 0 1 80.9017 58.7785" fill="none" stroke="black" stroke-width="2"/>

    <!-- Central Angle Arc -->
    <path d="M 0 0 L 100 0 A 30 30 0 0 1 80.9017 58.7785 Z" fill="none" stroke="black" stroke-width="1"/>
    <text x="60" y="30" text-anchor="middle" font-size="14" fill="black">72°</text>
  </g>
</svg>