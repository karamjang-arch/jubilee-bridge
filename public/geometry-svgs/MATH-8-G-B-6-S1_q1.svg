<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <g transform="translate(100, 100)">
    <!-- Triangle -->
    <polygon points="0,0 120,0 0,50" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Right angle marker -->
    <polygon points="0,0 10,0 10,10 0,10" fill="black" stroke="black" stroke-width="1"/>

    <!-- Labels for legs -->
    <text x="60" y="-10" text-anchor="middle" font-size="16" fill="black">12 units</text>
    <text x="-10" y="25" text-anchor="end" font-size="16" fill="black">5 units</text>

    <!-- Label for hypotenuse (placeholder) -->
    <text x="60" y="35" text-anchor="middle" font-size="16" fill="black">?</text>
  </g>
</svg>