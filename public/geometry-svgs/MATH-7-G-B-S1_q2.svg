<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 50)">
    <!-- Triangle -->
    <polygon points="0,0 300,0 150,100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Base Measurement -->
    <line x1="0" y1="0" x2="300" y2="0" stroke="black" stroke-width="2"/>
    <text x="150" y="-15" text-anchor="middle" font-size="16">15 inches</text>

    <!-- Height Measurement -->
    <line x1="150" y1="0" x2="150" y2="100" stroke="black" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="165" y="50" text-anchor="start" font-size="16">10 inches</text>

    <!-- Right angle marker for height -->
    <polygon points="150,0 150,10 160,0" fill="black"/>
  </g>
</svg>