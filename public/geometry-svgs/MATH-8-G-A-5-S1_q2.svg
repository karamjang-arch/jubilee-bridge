<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 150) rotate(-30)">
    <!-- Triangle PQR -->
    <polygon points="0,0 150,0 75,-130" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels -->
    <text x="0" y="-20" text-anchor="middle" font-size="16" font-family="Arial">P</text>
    <text x="150" y="15" text-anchor="middle" font-size="16" font-family="Arial">Q</text>
    <text x="75" y="-145" text-anchor="middle" font-size="16" font-family="Arial">R</text>

    <!-- Angle P -->
    <text x="-30" y="-10" text-anchor="end" font-size="14" font-family="Arial">45°</text>

    <!-- Exterior Angle at Q -->
    <path id="arc_ext_q" d="M 150 0 A 40 40 0 0 1 190 40" fill="none" stroke="black" stroke-width="1"/>
    <text x="200" y="30" text-anchor="start" font-size="14" font-family="Arial">130°</text>

    <!-- Angle R (calculated) -->
    <text x="75" y="-160" text-anchor="middle" font-size="14" font-family="Arial">55°</text>
  </g>
</svg>