<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Base Rectangle -->
  <rect x="100" y="120" width="200" height="60" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="200" y="105" text-anchor="middle" font-size="16" fill="black">8 inches</text>
  <text x="85" y="150" text-anchor="end" font-size="16" fill="black">6 inches</text>

  <!-- Roof Triangle 1 -->
  <polygon points="100,120 300,120 200,90" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="200" y="75" text-anchor="middle" font-size="16" fill="black">8 inches</text>
  <text x="315" y="110" text-anchor="start" font-size="16" fill="black">3 inches</text>
  <!-- Right angle marker for triangle 1 (approximate) -->
  <line x1="200" y1="120" x2="200" y2="105" stroke="black" stroke-width="1"/>
  <line x1="200" y1="120" x2="190" y2="120" stroke="black" stroke-width="1"/>
  <rect x="197" y="117" width="3" height="3" fill="black"/>


  <!-- Roof Triangle 2 -->
  <polygon points="100,120 300,120 200,150" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="200" y="165" text-anchor="middle" font-size="16" fill="black">8 inches</text>
  <text x="315" y="135" text-anchor="start" font-size="16" fill="black">3 inches</text>
  <!-- Right angle marker for triangle 2 (approximate) -->
  <line x1="200" y1="120" x2="200" y2="135" stroke="black" stroke-width="1"/>
  <line x1="200" y1="120" x2="190" y2="120" stroke="black" stroke-width="1"/>
  <rect x="197" y="117" width="3" height="3" fill="black"/>

</svg>