<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Axes -->
  <line x1="0" y1="0" x2="400" y2="0" stroke="gray" stroke-width="1"/>
  <line x1="0" y1="0" x2="0" y2="300" stroke="gray" stroke-width="1"/>
  <text x="390" y="15" font-size="12" fill="gray">X</text>
  <text x="15" y="295" font-size="12" fill="gray">Y</text>

  <!-- Origin Label -->
  <circle cx="0" cy="0" r="3" fill="black"/>
  <text x="10" y="10" font-size="12" fill="black">(0,0)</text>

  <!-- Triangle XYZ -->
  <polygon points="110,130 140,110 100,110" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Vertices Labels and Coordinates -->
  <circle cx="110" cy="130" r="3" fill="black"/>
  <text x="100" y="145" font-size="14" text-anchor="end">X(2, 3)</text>

  <circle cx="140" cy="110" r="3" fill="black"/>
  <text x="155" y="115" font-size="14">Y(5, 1)</text>

  <circle cx="100" cy="110" r="3" fill="black"/>
  <text x="90" y="115" font-size="14" text-anchor="end">Z(1, 1)</text>

  <!-- Rotation Explanation -->
  <text x="220" y="50" font-size="16" font-weight="bold">Rotation 90° Clockwise Around Origin</text>
  <text x="220" y="80" font-size="14">(x, y) -> (y, -x)</text>

  <!-- Rotated Triangle X'Y'Z' -->
  <!-- X(2,3) -> X'(3, -2) -->
  <polygon points="130,-70 110,-140 110,-100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Vertices Labels and Coordinates -->
  <circle cx="130" cy="-70" r="3" fill="red"/>
  <text x="145" y="-65" font-size="14" fill="red">X'(3, -2)</text>

  <!-- Y(5,1) -> Y'(1, -5) -->
  <circle cx="110" cy="-140" r="3" fill="red"/>
  <text x="125" y="-135" font-size="14" fill="red">Y'(1, -5)</text>

  <!-- Z(1,1) -> Z'(-1, -1) -->
  <circle cx="110" cy="-100" r="3" fill="red"/>
  <text x="125" y="-95" font-size="14" fill="red">Z'(-1, -1)</text>

  <!-- Visual Aid for Rotation -->
  <line x1="110" y1="130" x2="130" y2="-70" stroke="blue" stroke-dasharray="5,5"/>
  <text x="120" y="30" font-size="12" fill="blue">Rotation</text>

  <!-- Coordinate System Adjustment for SVG -->
  <g transform="translate(200, 150)">
    <!-- Triangle XYZ -->
    <polygon points="2-200,3-150 5-200,1-150 1-200,1-150" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <circle cx="2-200" cy="3-150" r="3" fill="black"/>
    <text x="2-200-10" y="3-150+15" font-size="14" text-anchor="end">X(2, 3)</text>
    <circle cx="5-200" cy="1-150" r="3" fill="black"/>
    <text x="5-200+15" y="1-150+5" font-size="14">Y(5, 1)</text>
    <circle cx="1-200" cy="1-150" r="3" fill="black"/>
    <text x="1-200-10" y="1-150+5" font-size="14" text-anchor="end">Z(1, 1)</text>

    <!-- Rotated Triangle X'Y'Z' -->
    <polygon points="3-200,-2-150 1-200,-5-150 -1-200,-1-150" fill="#e3f2fd" stroke="red" stroke-width="2"/>
    <circle cx="3-200" cy="-2-150" r="3" fill="red"/>
    <text x="3-200+15" y="-2-150+5" font-size="14" fill="red">X'(3, -2)</text>
    <circle cx="1-200" cy="-5-150" r="3" fill="red"/>
    <text x="1-200+15" y="-5-150+5" font-size="14" fill="red">Y'(1, -5)</text>
    <circle cx="-1-200" cy="-1-150" r="3" fill="red"/>
    <text x="-1-200-10" y="-1-150+5" font-size="14" fill="red" text-anchor="end">Z'(-1, -1)</text>

    <!-- Axes within the centered group -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="gray" stroke-width="1"/>
    <line x1="0" y1="-150" x2="0" y2="150" stroke="gray" stroke-width="1"/>
    <text x="190" y="-140" font-size="12" fill="gray">X</text>
    <text x="-190" y="140" font-size="12" fill="gray">Y</text>
    <circle cx="0" cy="0" r="3" fill="black"/>
    <text x="10" y="10" font-size="12" fill="black">(0,0)</text>
  </g>

</svg>