<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Quadrilateral ABCD -->
  <g id="quad-abcd" transform="translate(50, 100)">
    <polygon points="0,0 70,0 120,60 50,100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels for ABCD -->
    <text x="35" y="-10" text-anchor="middle" font-size="14">AB = 7 cm</text>
    <text x="95" y="30" text-anchor="middle" font-size="14">BC = 9 cm</text>
    <text x="85" y="115" text-anchor="middle" font-size="14">CD = 5 cm</text>
    <text x="25" y="50" text-anchor="middle" font-size="14">DA = 11 cm</text>
  </g>

  <!-- Quadrilateral EFGH (congruent to ABCD) -->
  <g id="quad-efgh" transform="translate(200, 100)">
    <polygon points="0,0 70,0 120,60 50,100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels for EFGH -->
    <text x="35" y="-10" text-anchor="middle" font-size="14">EF = 7 cm</text>
    <text x="95" y="30" text-anchor="middle" font-size="14">FG = 9 cm</text>
    <text x="85" y="115" text-anchor="middle" font-size="14">GH = 5 cm</text>
    <text x="25" y="50" text-anchor="middle" font-size="14">HE = 11 cm</text>
  </g>

  <!-- Problem Statement Text -->
  <text x="200" y="30" text-anchor="middle" font-size="16" font-weight="bold">Congruent Quadrilaterals</text>
  <text x="200" y="55" text-anchor="middle" font-size="14">ABCD is congruent to EFGH.</text>
  <text x="200" y="75" text-anchor="middle" font-size="14">AB=7, BC=9, CD=5, DA=11.</text>
  <text x="200" y="95" text-anchor="middle" font-size="14">Find the length of GH.</text>

</svg>