<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Original Square -->
  <polygon points="100,100 120,100 120,120 100,120" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Labels for Original Square -->
  <text x="90" y="110" text-anchor="end" font-size="14">P(1, 2)</text>
  <text x="130" y="110" text-anchor="start" font-size="14">Q(3, 2)</text>
  <text x="130" y="130" text-anchor="start" font-size="14">R(3, 4)</text>
  <text x="90" y="130" text-anchor="end" font-size="14">S(1, 4)</text>

  <!-- Side length labels for Original Square -->
  <text x="110" y="90" text-anchor="middle" font-size="14">2</text>
  <text x="135" y="110" text-anchor="middle" font-size="14">2</text>
  <text x="110" y="135" text-anchor="middle" font-size="14">2</text>
  <text x="85" y="110" text-anchor="middle" font-size="14">2</text>

  <!-- Translation Arrows -->
  <line x1="110" y1="150" x2="110" y2="170" stroke="blue" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="110" y="185" text-anchor="middle" font-size="14" fill="blue">3 units right</text>

  <line x1="150" y1="110" x2="150" y2="130" stroke="red" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="165" y="110" text-anchor="start" font-size="14" fill="red">2 units down</text>

  <!-- New Square -->
  <polygon points="160,120 180,120 180,140 160,140" fill="#c8e6c9" stroke="black" stroke-width="2"/>

  <!-- Labels for New Square -->
  <text x="150" y="130" text-anchor="end" font-size="14">P'(4, 0)</text>
  <text x="190" y="130" text-anchor="start" font-size="14">Q'(6, 0)</text>
  <text x="190" y="150" text-anchor="start" font-size="14">R'(6, 2)</text>
  <text x="150" y="150" text-anchor="end" font-size="14">S'(4, 2)</text>

  <!-- Marker for right angles -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="blue"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="red"/>
    </marker>
  </defs>
</svg>