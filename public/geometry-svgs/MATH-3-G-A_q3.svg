<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Circle -->
  <circle cx="200" cy="150" r="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Inscribed Square -->
  <!-- The diagonal of the square is the diameter of the circle (2 * radius) -->
  <!-- Diagonal = 2 * 10 = 20 inches -->
  <!-- Let side length of the square be 's'. By Pythagorean theorem: s^2 + s^2 = diagonal^2 -->
  <!-- 2s^2 = 20^2 -->
  <!-- 2s^2 = 400 -->
  <!-- s^2 = 200 -->
  <!-- s = sqrt(200) = 10 * sqrt(2) ≈ 14.14 inches -->

  <!-- To draw the square, we need its vertices. -->
  <!-- The vertices will be at (200 ± s/sqrt(2), 150 ± s/sqrt(2)) -->
  <!-- s/sqrt(2) = (10 * sqrt(2)) / sqrt(2) = 10 -->
  <!-- So vertices are at (200 ± 10, 150 ± 10) -->
  <!-- This calculation is incorrect for drawing. The vertices are at (200 ± r*cos(theta), 150 ± r*sin(theta)) -->
  <!-- For a square inscribed in a circle, the vertices are at angles 45, 135, 225, 315 degrees. -->
  <!-- x = cx + r * cos(theta), y = cy + r * sin(theta) -->
  <!-- Vertex 1 (45 deg): x = 200 + 100*cos(45) = 200 + 100*(sqrt(2)/2) = 200 + 50*sqrt(2) ≈ 270.7 -->
  <!-- Vertex 1 (45 deg): y = 150 + 100*sin(45) = 150 + 100*(sqrt(2)/2) = 150 + 50*sqrt(2) ≈ 220.7 -->
  <!-- Vertex 2 (135 deg): x = 200 + 100*cos(135) = 200 + 100*(-sqrt(2)/2) = 200 - 50*sqrt(2) ≈ 129.3 -->
  <!-- Vertex 2 (135 deg): y = 150 + 100*sin(135) = 150 + 100*(sqrt(2)/2) = 150 + 50*sqrt(2) ≈ 220.7 -->
  <!-- Vertex 3 (225 deg): x = 200 + 100*cos(225) = 200 + 100*(-sqrt(2)/2) = 200 - 50*sqrt(2) ≈ 129.3 -->
  <!-- Vertex 3 (225 deg): y = 150 + 100*sin(225) = 150 + 100*(-sqrt(2)/2) = 150 - 50*sqrt(2) ≈ 79.3 -->
  <!-- Vertex 4 (315 deg): x = 200 + 100*cos(315) = 200 + 100*(sqrt(2)/2) = 200 + 50*sqrt(2) ≈ 270.7 -->
  <!-- Vertex 4 (315 deg): y = 150 + 100*sin(315) = 150 + 100*(-sqrt(2)/2) = 150 - 50*sqrt(2) ≈ 79.3 -->

  <!-- Let's simplify the drawing by rotating the square by 45 degrees -->
  <!-- Vertices will be at (200 ± 100, 150) and (200, 150 ± 100) -->
  <!-- This is a diamond shape, which is a square rotated by 45 degrees. -->
  <!-- The side length of this square is sqrt((100-0)^2 + (0-100)^2) = sqrt(10000 + 10000) = sqrt(20000) = 100*sqrt(2) -->
  <!-- The diagonal is 200. This is correct. -->

  <polygon points="200,50 300,150 200,250 100,150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Radius Label -->
  <line x1="200" y1="150" x2="300" y2="150" stroke="black" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="310" y="155" font-size="14" fill="black">10 inches</text>
  <circle cx="200" cy="150" r="3" fill="black"/>
  <circle cx="300" cy="150" r="3" fill="black"/>

  <!-- Diagonal Label (Diameter of Circle) -->
  <line x1="100" y1="150" x2="300" y2="150" stroke="black" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="200" y="170" text-anchor="middle" font-size="14" fill="black">20 inches</text>

  <!-- Side length of the square -->
  <!-- The side length 's' is such that s^2 = 200 -->
  <!-- s = sqrt(200) = 10 * sqrt(2) ≈ 14.14 -->
  <!-- We can label the side of the square. -->
  <!-- Let's find the midpoint of one side for labeling. -->
  <!-- Midpoint of the top-right side (between (300,150) and (200,250)) -->
  <!-- Midpoint x = (300+200)/2 = 250 -->
  <!-- Midpoint y = (150+250)/2 = 200 -->
  <!-- We can also label the length of the diagonal of the square, which is the diameter of the circle. -->
  <!-- The diagonal of the square is 20 inches. -->

  <!-- Label for the area of the square -->
  <text x="200" y="280" text-anchor="middle" font-size="16" fill="black">Area of Square = 200 sq inches</text>

</svg>