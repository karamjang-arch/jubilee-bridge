<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Original Square -->
  <polygon points="100,100 120,100 120,120 100,120" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="90" y="110" text-anchor="end" font-size="14">(1,1)</text>
  <text x="130" y="110" text-anchor="start" font-size="14">(3,1)</text>
  <text x="130" y="130" text-anchor="start" font-size="14">(3,3)</text>
  <text x="90" y="130" text-anchor="end" font-size="14">(1,3)</text>

  <!-- Rotation and Dilation -->
  <polygon points="150,50 140,100 90,110 100,60" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="140" y="40" text-anchor="middle" font-size="14">Rotated & Dilated</text>

  <!-- Labels for original square -->
  <line x1="100" y1="100" x2="120" y2="100" stroke="black" stroke-width="1"/>
  <text x="110" y="95" text-anchor="middle" font-size="14">2</text>
  <line x1="120" y1="100" x2="120" y2="120" stroke="black" stroke-width="1"/>
  <text x="125" y="110" text-anchor="start" font-size="14">2</text>

  <!-- Labels for resulting figure -->
  <line x1="150" y1="50" x2="140" y2="100" stroke="black" stroke-width="1"/>
  <text x="145" y="75" text-anchor="middle" font-size="14">1</text>
  <line x1="140" y1="100" x2="90" y2="110" stroke="black" stroke-width="1"/>
  <text x="115" y="105" text-anchor="middle" font-size="14">1</text>

  <!-- Origin -->
  <circle cx="200" cy="150" r="3" fill="red"/>
  <text x="210" y="155" font-size="14" fill="red">Origin (0,0)</text>

  <!-- Arrows indicating transformation -->
  <path d="M 130 110 L 140 100" stroke="blue" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 130 110 L 90 110" stroke="blue" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 120 120 L 100 110" stroke="blue" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 100 120 L 100 110" stroke="blue" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
        markerWidth="6" markerHeight="6"
        orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="blue"/>
    </marker>
  </defs>

  <!-- Labels for resulting vertices -->
  <text x="150" y="45" text-anchor="middle" font-size="14">(0, -1)</text>
  <text x="135" y="115" text-anchor="middle" font-size="14">(1, -1)</text>
  <text x="85" y="115" text-anchor="middle" font-size="14">(1, 0)</text>
  <text x="95" y="55" text-anchor="middle" font-size="14">(0, 0)</text>

</svg>