<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="100" y="75" width="200" height="80" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Length Label -->
  <text x="200" y="175" text-anchor="middle" font-size="16" fill="black">15 meters</text>
  <line x1="100" y1="170" x2="300" y2="170" stroke="black" stroke-width="2"/>

  <!-- Width Label -->
  <text x="315" y="115" text-anchor="middle" font-size="16" fill="black" transform="rotate(-90 315 115)">8 meters</text>
  <line x1="310" y1="75" x2="310" y2="155" stroke="black" stroke-width="2"/>

  <!-- Right angle markers -->
  <line x1="100" y1="155" x2="100" y2="75" stroke="black" stroke-width="2"/>
  <line x1="100" y1="75" x2="120" y2="75" stroke="black" stroke-width="2"/>
  <polygon points="100,155 100,145 110,155" fill="black"/>

  <line x1="300" y1="75" x2="300" y2="155" stroke="black" stroke-width="2"/>
  <line x1="300" y1="75" x2="280" y2="75" stroke="black" stroke-width="2"/>
  <polygon points="300,75 290,75 300,85" fill="black"/>

  <line x1="100" y1="75" x2="300" y2="75" stroke="black" stroke-width="2"/>
  <line x1="100" y1="75" x2="100" y2="55" stroke="black" stroke-width="2"/>
  <polygon points="100,75 110,75 100,65" fill="black"/>

  <line x1="300" y1="155" x2="100" y2="155" stroke="black" stroke-width="2"/>
  <line x1="300" y1="155" x2="300" y2="175" stroke="black" stroke-width="2"/>
  <polygon points="300,155 300,165 290,155" fill="black"/>

</svg>