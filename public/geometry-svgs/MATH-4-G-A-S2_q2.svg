<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Rectangle -->
  <rect x="75" y="100" width="150" height="80" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <!-- Length label -->
  <text x="150" y="85" text-anchor="middle" font-size="16">15 units</text>
  <!-- Width label -->
  <text x="235" y="140" text-anchor="start" font-size="16" transform="rotate(90 235 140)">8 units</text>

  <!-- Equal side marks for rectangle -->
  <!-- Top side -->
  <line x1="75" y1="100" x2="105" y2="100" stroke="black" stroke-width="2"/>
  <line x1="155" y1="100" x2="185" y2="100" stroke="black" stroke-width="2"/>
  <!-- Bottom side -->
  <line x1="75" y1="180" x2="105" y2="180" stroke="black" stroke-width="2"/>
  <line x1="155" y1="180" x2="185" y2="180" stroke="black" stroke-width="2"/>
  <!-- Left side -->
  <line x1="75" y1="100" x2="75" y2="120" stroke="black" stroke-width="2"/>
  <line x1="75" y1="140" x2="75" y2="160" stroke="black" stroke-width="2"/>
  <!-- Right side -->
  <line x1="225" y1="100" x2="225" y2="120" stroke="black" stroke-width="2"/>
  <line x1="225" y1="140" x2="225" y2="160" stroke="black" stroke-width="2"/>

  <!-- Text explaining the problem -->
  <text x="200" y="30" text-anchor="middle" font-size="16">Rectangle: Length = 15, Width = 8</text>
  <text x="200" y="50" text-anchor="middle" font-size="16">Perimeter of Rectangle = 2*(15 + 8) = 46</text>
  <text x="200" y="70" text-anchor="middle" font-size="16">Square has same perimeter.</text>

  <!-- Square (conceptual representation of the side length) -->
  <!-- We'll draw a representative square and label its side -->
  <rect x="150" y="220" width="100" height="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <!-- Side label -->
  <text x="200" y="210" text-anchor="middle" font-size="16">Side = 11.5 units</text>

  <!-- Equal side marks for square -->
  <!-- Top side -->
  <line x1="150" y1="220" x2="170" y2="220" stroke="black" stroke-width="2"/>
  <line x1="180" y1="220" x2="200" y2="220" stroke="black" stroke-width="2"/>
  <line x1="210" y1="220" x2="230" y2="220" stroke="black" stroke-width="2"/>
  <!-- Bottom side -->
  <line x1="150" y1="320" x2="170" y2="320" stroke="black" stroke-width="2"/>
  <line x1="180" y1="320" x2="200" y2="320" stroke="black" stroke-width="2"/>
  <line x1="210" y1="320" x2="230" y2="320" stroke="black" stroke-width="2"/>
  <!-- Left side -->
  <line x1="150" y1="220" x2="150" y2="240" stroke="black" stroke-width="2"/>
  <line x1="150" y1="250" x2="150" y2="270" stroke="black" stroke-width="2"/>
  <line x1="150" y1="280" x2="150" y2="300" stroke="black" stroke-width="2"/>
  <!-- Right side -->
  <line x1="250" y1="220" x2="250" y2="240" stroke="black" stroke-width="2"/>
  <line x1="250" y1="250" x2="250" y2="270" stroke="black" stroke-width="2"/>
  <line x1="250" y1="280" x2="250" y2="300" stroke="black" stroke-width="2"/>

</svg>