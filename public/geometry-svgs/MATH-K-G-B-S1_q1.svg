<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Original Square -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="100" height="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Side length label -->
    <text x="110" y="50" dominant-baseline="middle" font-size="16">5 units</text>
    <text x="50" y="110" text-anchor="middle" font-size="16">5 units</text>
    <!-- Equal side marks -->
    <line x1="5" y1="5" x2="15" y2="5" stroke="black" stroke-width="2"/>
    <line x1="5" y1="15" x2="5" y2="25" stroke="black" stroke-width="2"/>
    <line x1="85" y1="5" x2="95" y2="5" stroke="black" stroke-width="2"/>
    <line x1="95" y1="5" x2="95" y2="15" stroke="black" stroke-width="2"/>
    <line x1="5" y1="85" x2="15" y2="85" stroke="black" stroke-width="2"/>
    <line x1="5" y1="85" x2="5" y2="95" stroke="black" stroke-width="2"/>
    <line x1="85" y1="95" x2="95" y2="95" stroke="black" stroke-width="2"/>
    <line x1="95" y1="85" x2="95" y2="95" stroke="black" stroke-width="2"/>
  </g>

  <!-- Doubled Square -->
  <g transform="translate(200, 75)">
    <rect x="0" y="0" width="200" height="200" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Side length label -->
    <text x="210" y="100" dominant-baseline="middle" font-size="16">10 units</text>
    <text x="100" y="210" text-anchor="middle" font-size="16">10 units</text>
    <!-- Equal side marks -->
    <line x1="10" y1="10" x2="20" y2="10" stroke="black" stroke-width="2"/>
    <line x1="10" y1="10" x2="10" y2="20" stroke="black" stroke-width="2"/>
    <line x1="180" y1="10" x2="190" y2="10" stroke="black" stroke-width="2"/>
    <line x1="190" y1="10" x2="190" y2="20" stroke="black" stroke-width="2"/>
    <line x1="10" y1="180" x2="20" y2="180" stroke="black" stroke-width="2"/>
    <line x1="10" y1="180" x2="10" y2="190" stroke="black" stroke-width="2"/>
    <line x1="180" y1="190" x2="190" y2="190" stroke="black" stroke-width="2"/>
    <line x1="190" y1="180" x2="190" y2="190" stroke="black" stroke-width="2"/>
  </g>

  <!-- Labels for the problem -->
  <text x="200" y="30" text-anchor="middle" font-size="18" font-weight="bold">Square Area Problem</text>
  <text x="200" y="60" text-anchor="middle" font-size="16">Original side length: 5 units</text>
  <text x="200" y="90" text-anchor="middle" font-size="16">Side length doubled: 10 units</text>
</svg>