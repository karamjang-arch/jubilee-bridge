<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- The problem states the interior angle sum is 1080 degrees.
       The formula for the sum of interior angles of a polygon is (n-2) * 180.
       So, (n-2) * 180 = 1080
       n-2 = 1080 / 180
       n-2 = 6
       n = 8
       The polygon has 8 sides (an octagon).
       We will draw a regular octagon for visualization.
  -->

  <g transform="translate(200, 150)">
    <!-- Regular Octagon Calculation -->
    <!-- Radius for drawing the octagon -->
    <defs>
      <polygon id="octagon" points="
        0,-70
        49.497,-49.497
        70,0
        49.497,49.497
        0,70
        -49.497,49.497
        -70,0
        -49.497,-49.497
      "/>
    </defs>
    <use xlink:href="#octagon" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels -->
    <!-- We will label one interior angle -->
    <text x="0" y="-90" text-anchor="middle" font-size="16" fill="black">Interior Angle Sum: 1080°</text>

    <!-- Label for the number of sides (derived) -->
    <text x="0" y="110" text-anchor="middle" font-size="16" fill="black">Number of Sides: 8</text>
  </g>
</svg>