<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Axes -->
  <line x1="0" y1="150" x2="400" y2="150" stroke="gray" stroke-width="1"/> <!-- X-axis -->
  <line x1="200" y1="0" x2="200" y2="300" stroke="gray" stroke-width="1"/> <!-- Y-axis -->

  <!-- Triangle ABC -->
  <polygon points="100,100 150,200 50,200" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="100" y="90" text-anchor="middle" font-size="16">A</text>
  <text x="150" y="215" text-anchor="middle" font-size="16">B</text>
  <text x="50" y="215" text-anchor="middle" font-size="16">C</text>

  <!-- Angle BAC measurement -->
  <path id="arc-bac" d="M 90 90 A 30 30 0 0 1 110 90" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="100" y="75" text-anchor="middle" font-size="14">55°</text>

  <!-- Reflected Triangle A'B'C' -->
  <polygon points="300,100 250,200 350,200" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="300" y="90" text-anchor="middle" font-size="16">A'</text>
  <text x="250" y="215" text-anchor="middle" font-size="16">B'</text>
  <text x="350" y="215" text-anchor="middle" font-size="16">C'</text>

  <!-- Angle B'A'C' measurement (implied) -->
  <text x="300" y="75" text-anchor="middle" font-size="14">55°</text>

  <!-- Labels for clarity -->
  <text x="125" y="250" text-anchor="middle" font-size="14">Triangle ABC</text>
  <text x="275" y="250" text-anchor="middle" font-size="14">Triangle A'B'C'</text>
  <text x="200" y="165" text-anchor="middle" font-size="14">Reflection across Y-axis</text>

</svg>