<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(200, 150)">
    <!-- Circle -->
    <circle cx="0" cy="0" r="60" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Diameter line -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="black" stroke-width="2"/>

    <!-- Center point -->
    <circle cx="0" cy="0" r="3" fill="black"/>

    <!-- Diameter label -->
    <text x="0" y="-75" text-anchor="middle" font-size="16" fill="black">Diameter = 12 inches</text>

    <!-- Radius line (optional, for clarity) -->
    <line x1="0" y1="0" x2="60" y2="0" stroke="black" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="30" y="15" text-anchor="middle" font-size="14" fill="black">6 inches</text>
  </g>
</svg>