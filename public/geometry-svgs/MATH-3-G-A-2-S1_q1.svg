<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <g transform="translate(50, 50)">
    <!-- The Rectangle -->
    <rect x="0" y="0" width="300" height="180" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Dividing Lines -->
    <line x1="100" y1="0" x2="100" y2="180" stroke="black" stroke-width="2"/>
    <line x1="200" y1="0" x2="200" y2="180" stroke="black" stroke-width="2"/>

    <!-- Labels -->
    <!-- Length Label -->
    <text x="150" y="-10" text-anchor="middle" font-size="16" fill="black">Length: 10 units</text>
    <line x1="0" y1="-5" x2="300" y2="-5" stroke="black" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="0" stroke="black" stroke-width="1"/>
    <line x1="300" y1="-10" x2="300" y2="0" stroke="black" stroke-width="1"/>

    <!-- Width Label -->
    <text x="-20" y="90" text-anchor="end" font-size="16" fill="black">Width: 6 units</text>
    <line x1="-5" y1="0" x2="-5" y2="180" stroke="black" stroke-width="1"/>
    <line x1="-10" y1="0" x2="0" y2="0" stroke="black" stroke-width="1"/>
    <line x1="-10" y1="180" x2="0" y2="180" stroke="black" stroke-width="1"/>

    <!-- Area Labels for each part -->
    <text x="50" y="90" text-anchor="middle" font-size="14" fill="black">Part 1</text>
    <text x="150" y="90" text-anchor="middle" font-size="14" fill="black">Part 2</text>
    <text x="250" y="90" text-anchor="middle" font-size="14" fill="black">Part 3</text>
  </g>
</svg>