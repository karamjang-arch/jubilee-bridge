<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Patio Vertices -->
  <circle cx="140" cy="200" r="3" fill="black"/> <!-- (1, -2) -->
  <circle cx="260" cy="200" r="3" fill="black"/> <!-- (7, -2) -->
  <circle cx="260" cy="150" r="3" fill="black"/> <!-- (7, 3) -->
  <circle cx="140" cy="150" r="3" fill="black"/> <!-- (1, 3) -->

  <!-- Patio Rectangle -->
  <rect x="140" y="150" width="120" height="50" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Measurement Labels -->
  <!-- Width Label -->
  <text x="200" y="225" text-anchor="middle" font-size="14">6 ft</text>
  <!-- Height Label -->
  <text x="125" y="175" text-anchor="end" font-size="14">5 ft</text>

  <!-- Coordinate System (Optional, for context) -->
  <!-- X-axis -->
  <line x1="100" y1="250" x2="300" y2="250" stroke="gray" stroke-width="1"/>
  <text x="300" y="265" font-size="12" fill="gray">X</text>
  <!-- Y-axis -->
  <line x1="100" y1="100" x2="100" y2="250" stroke="gray" stroke-width="1"/>
  <text x="95" y="100" font-size="12" fill="gray">Y</text>

  <!-- Origin Label -->
  <text x="95" y="265" font-size="12" fill="gray">(0,0)</text>

  <!-- Coordinate Labels for Patio Vertices -->
  <text x="130" y="215" font-size="12" fill="black">(1, -2)</text>
  <text x="265" y="215" font-size="12" fill="black">(7, -2)</text>
  <text x="265" y="145" font-size="12" fill="black">(7, 3)</text>
  <text x="130" y="145" font-size="12" fill="black">(1, 3)</text>

</svg>