<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Helper function to scale coordinates for SVG -->
  <defs>
    <g id="triangleABC">
      <polygon points="100,200 150,110 200,220" fill="#e3f2fd" stroke="black" stroke-width="2"/>
      <!-- Vertex A -->
      <circle cx="100" cy="200" r="4" fill="red"/>
      <text x="90" y="215" font-size="14" fill="black">A(1, 2)</text>
      <!-- Vertex B -->
      <circle cx="150" cy="110" r="4" fill="blue"/>
      <text x="160" y="105" font-size="14" fill="black">B(3, 5)</text>
      <!-- Vertex C -->
      <circle cx="200" cy="220" r="4" fill="green"/>
      <text x="210" y="225" font-size="14" fill="black">C(4, 1)</text>
    </g>
    <g id="triangleAprimeBprimeCprime">
      <polygon points="170,240 220,150 270,260" fill="#e3f2fd" stroke="black" stroke-width="2"/>
      <!-- Vertex A' -->
      <circle cx="170" cy="240" r="4" fill="red"/>
      <text x="160" y="255" font-size="14" fill="black">A'(4, 0)</text>
      <!-- Vertex B' -->
      <circle cx="220" cy="150" r="4" fill="blue"/>
      <text x="230" y="145" font-size="14" fill="black">B'(6, 3)</text>
      <!-- Vertex C' -->
      <circle cx="270" cy="260" r="4" fill="green"/>
      <text x="280" y="265" font-size="14" fill="black">C'(7, -1)</text>
    </g>
  </defs>

  <!-- Original Triangle ABC -->
  <use xlink:href="#triangleABC" x="0" y="0" />

  <!-- Translated Triangle A'B'C' -->
  <use xlink:href="#triangleAprimeBprimeCprime" x="0" y="0" />

  <!-- Translation Arrows and Label -->
  <g stroke="black" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <!-- Arrow from A to A' -->
    <path d="M100 200 L170 240" />
    <!-- Arrow from B to B' -->
    <path d="M150 110 L220 150" />
    <!-- Arrow from C to C' -->
    <path d="M200 220 L270 260" />
  </g>

  <!-- Text for translation -->
  <text x="140" y="180" font-size="16" fill="black" transform="rotate(-45 140 180)">3 units right, 2 units down</text>

  <!-- Add arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
        markerWidth="6" markerHeight="6"
        orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

</svg>