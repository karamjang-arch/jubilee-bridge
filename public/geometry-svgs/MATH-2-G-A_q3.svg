<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <g transform="translate(100, 150)">
    <!-- Triangle -->
    <polygon points="0,-70 60,0 -60,0" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Base Label -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="0" y="15" text-anchor="middle" font-size="14">12 feet</text>

    <!-- Height Label -->
    <line x1="0" y1="-70" x2="0" y2="0" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="20" y="-35" text-anchor="start" font-size="14">7 feet</text>

    <!-- Right angle marker -->
    <polygon points="0,0 10,0 10,-10" fill="none" stroke="black" stroke-width="1"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="black"/>
    </marker>
  </defs>
</svg>