<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Original Triangle -->
  <g transform="translate(100, 150) rotate(-90)">
    <polygon points="0,0 60,0 0,80" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Right angle marker -->
    <path d="M 0 0 L 0 10 L 10 10 Z" fill="black" stroke="black" stroke-width="1"/>
    <!-- Leg 1 label -->
    <text x="30" y="-15" text-anchor="middle" font-size="14">6 inches</text>
    <!-- Leg 2 label -->
    <text x="-15" y="40" text-anchor="middle" font-size="14" transform="rotate(-90, -15, 40)">8 inches</text>
  </g>

  <!-- Rotated Triangle -->
  <g transform="translate(250, 150) rotate(0)">
    <polygon points="0,0 80,0 0,60" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Right angle marker -->
    <path d="M 0 0 L 0 10 L 10 10 Z" fill="black" stroke="black" stroke-width="1"/>
    <!-- Leg 1 label (rotated) -->
    <text x="40" y="-15" text-anchor="middle" font-size="14">8 inches</text>
    <!-- Leg 2 label (rotated) -->
    <text x="-15" y="30" text-anchor="middle" font-size="14" transform="rotate(-90, -15, 30)">6 inches</text>
  </g>

  <!-- Hypotenuse label for rotated triangle -->
  <text x="290" y="100" text-anchor="middle" font-size="14">10 inches</text>

  <!-- Origin -->
  <circle cx="200" cy="150" r="3" fill="red"/>
  <text x="200" y="165" text-anchor="middle" font-size="12">(0,0)</text>

</svg>