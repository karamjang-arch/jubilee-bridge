<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Base Triangle 1 -->
  <polygon points="150,100 250,100 200,100-1.732*50" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="200" y="80" text-anchor="middle" font-size="14">6 inches</text>
  <text x="140" y="130" text-anchor="middle" font-size="14">6 inches</text>
  <text x="260" y="130" text-anchor="middle" font-size="14">6 inches</text>

  <!-- Top Triangle 1 -->
  <polygon points="150,200 250,200 200,200-1.732*50" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="200" y="220" text-anchor="middle" font-size="14">6 inches</text>
  <text x="140" y="250" text-anchor="middle" font-size="14">6 inches</text>
  <text x="260" y="250" text-anchor="middle" font-size="14">6 inches</text>

  <!-- Connecting Rectangle 1 -->
  <rect x="150" y="100" width="100" height="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="200" y="145" text-anchor="middle" font-size="14">10 inches</text>
  <text x="175" y="100" transform="rotate(-90 175 100)" font-size="14">6 inches</text>
  <text x="225" y="100" transform="rotate(-90 225 100)" font-size="14">6 inches</text>

  <!-- Connecting Rectangle 2 -->
  <polygon points="250,100 200,100-1.732*50 200,200-1.732*50 250,200" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="275" y="150" text-anchor="middle" font-size="14">10 inches</text>
  <text x="230" y="120" transform="rotate(-30 230 120)" font-size="14">6 inches</text>
  <text x="230" y="220" transform="rotate(-30 230 220)" font-size="14">6 inches</text>

  <!-- Connecting Rectangle 3 -->
  <polygon points="150,100 200,100-1.732*50 200,200-1.732*50 150,200" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="125" y="150" text-anchor="middle" font-size="14">10 inches</text>
  <text x="170" y="120" transform="rotate(30 170 120)" font-size="14">6 inches</text>
  <text x="170" y="220" transform="rotate(30 170 220)" font-size="14">6 inches</text>

</svg>