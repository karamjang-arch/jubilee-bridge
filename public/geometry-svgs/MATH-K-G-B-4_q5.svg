<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Smaller Sphere -->
  <circle cx="150" cy="150" r="50" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="150" y="215" text-anchor="middle" font-size="14" fill="black">Radius: 3 cm</text>
  <text x="150" y="230" text-anchor="middle" font-size="14" fill="black">SA: 36π cm²</text>

  <!-- Larger Sphere -->
  <circle cx="280" cy="150" r="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <text x="280" y="275" text-anchor="middle" font-size="14" fill="black">Radius: 6 cm</text>
  <text x="280" y="290" text-anchor="middle" font-size="14" fill="black">SA: ? cm²</text>

  <!-- Visual Aid for Similarity -->
  <line x1="150" y1="100" x2="280" y2="50" stroke="gray" stroke-dasharray="4 2"/>
  <line x1="150" y1="200" x2="280" y2="250" stroke="gray" stroke-dasharray="4 2"/>

  <!-- Labels for Radii -->
  <line x1="150" y1="100" x2="150" y2="150" stroke="black" stroke-width="1"/>
  <text x="160" y="125" font-size="14" fill="black">3 cm</text>

  <line x1="280" y1="50" x2="280" y2="150" stroke="black" stroke-width="1"/>
  <text x="290" y="100" font-size="14" fill="black">6 cm</text>

</svg>