<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Original Square -->
  <g id="original-square" transform="translate(100, 100)">
    <rect x="0" y="0" width="100" height="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Side length labels -->
    <text x="50" y="-10" text-anchor="middle" font-size="14">6 units</text>
    <text x="100" y="50" text-anchor="start" font-size="14" transform="rotate(90, 100, 50)">6 units</text>
    <text x="50" y="110" text-anchor="middle" font-size="14">6 units</text>
    <text x="0" y="50" text-anchor="end" font-size="14" transform="rotate(-90, 0, 50)">6 units</text>

    <!-- Equal side marks -->
    <line x1="5" y1="5" x2="15" y2="5" stroke="black" stroke-width="1"/>
    <line x1="5" y1="15" x2="15" y2="15" stroke="black" stroke-width="1"/>
    <line x1="85" y1="5" x2="95" y2="5" stroke="black" stroke-width="1"/>
    <line x1="85" y1="15" x2="95" y2="15" stroke="black" stroke-width="1"/>
    <line x1="85" y1="85" x2="95" y2="85" stroke="black" stroke-width="1"/>
    <line x1="85" y1="95" x2="95" y2="95" stroke="black" stroke-width="1"/>
    <line x1="5" y1="85" x2="15" y2="85" stroke="black" stroke-width="1"/>
    <line x1="5" y1="95" x2="15" y2="95" stroke="black" stroke-width="1"/>

    <!-- Right angle marker -->
    <line x1="0" y1="0" x2="10" y2="0" stroke="black" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="black" stroke-width="2"/>
  </g>

  <!-- Rotated Square -->
  <g id="rotated-square" transform="translate(200, 100) rotate(-90)">
    <rect x="0" y="0" width="100" height="100" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Side length labels -->
    <text x="50" y="-10" text-anchor="middle" font-size="14">6 units</text>
    <text x="100" y="50" text-anchor="start" font-size="14" transform="rotate(90, 100, 50)">6 units</text>
    <text x="50" y="110" text-anchor="middle" font-size="14">6 units</text>
    <text x="0" y="50" text-anchor="end" font-size="14" transform="rotate(-90, 0, 50)">6 units</text>

    <!-- Equal side marks -->
    <line x1="5" y1="5" x2="15" y2="5" stroke="black" stroke-width="1"/>
    <line x1="5" y1="15" x2="15" y2="15" stroke="black" stroke-width="1"/>
    <line x1="85" y1="5" x2="95" y2="5" stroke="black" stroke-width="1"/>
    <line x1="85" y1="15" x2="95" y2="15" stroke="black" stroke-width="1"/>
    <line x1="85" y1="85" x2="95" y2="85" stroke="black" stroke-width="1"/>
    <line x1="85" y1="95" x2="95" y2="95" stroke="black" stroke-width="1"/>
    <line x1="5" y1="85" x2="15" y2="85" stroke="black" stroke-width="1"/>
    <line x1="5" y1="95" x2="15" y2="95" stroke="black" stroke-width="1"/>

    <!-- Right angle marker -->
    <line x1="0" y1="0" x2="10" y2="0" stroke="black" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="black" stroke-width="2"/>
  </g>

  <!-- Labels for clarity -->
  <text x="150" y="50" text-anchor="middle" font-size="16">Original Square</text>
  <text x="300" y="50" text-anchor="middle" font-size="16">Rotated Square</text>
  <text x="200" y="250" text-anchor="middle" font-size="16">The corresponding interior angle remains 90 degrees.</text>
</svg>