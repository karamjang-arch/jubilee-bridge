<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Original Parallelogram -->
  <polygon id="original-parallelogram" points="100,150 150,50 250,50 200,150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Labels for original parallelogram -->
  <!-- Angle 1 (80 degrees) -->
  <text x="120" y="140" font-family="Arial" font-size="14" fill="black" text-anchor="middle">80°</text>
  <!-- Angle 2 (100 degrees) -->
  <text x="230" y="140" font-family="Arial" font-size="14" fill="black" text-anchor="middle">100°</text>
  <!-- Side length (example, not explicitly given but implied by parallelogram) -->
  <text x="175" y="40" font-family="Arial" font-size="14" fill="black" text-anchor="middle">L</text>
  <text x="150" y="100" font-family="Arial" font-size="14" fill="black" text-anchor="end">W</text>

  <!-- New Parallelogram (stretched) -->
  <!-- Assuming stretching in the direction of the longer sides (L) -->
  <polygon id="new-parallelogram" points="100,150 250,50 400,50 250,150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Labels for new parallelogram -->
  <!-- Angle 1 (smaller angle) -->
  <text x="275" y="140" font-family="Arial" font-size="14" fill="black" text-anchor="middle">θ</text>
  <!-- Angle 2 (larger angle) -->
  <text x="370" y="140" font-family="Arial" font-size="14" fill="black" text-anchor="middle">180°-θ</text>
  <!-- Side length (stretched) -->
  <text x="275" y="40" font-family="Arial" font-size="14" fill="black" text-anchor="middle">2L</text>
  <!-- Side length (same) -->
  <text x="250" y="100" font-family="Arial" font-size="14" fill="black" text-anchor="end">W</text>

  <!-- Explanation Text -->
  <text x="200" y="280" font-family="Arial" font-size="14" fill="black" text-anchor="middle">Original angles: 80°, 100°</text>
  <text x="200" y="295" font-family="Arial" font-size="14" fill="black" text-anchor="middle">New smaller angle: θ (calculated)</text>

</svg>