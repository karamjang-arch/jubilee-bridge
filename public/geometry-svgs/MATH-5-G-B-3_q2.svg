<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <g transform="translate(100, 75)">
    <rect id="square" x="0" y="0" width="150" height="150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Equal side marks -->
    <line x1="10" y1="10" x2="20" y2="10" stroke="black" stroke-width="2"/>
    <line x1="10" y1="25" x2="20" y2="25" stroke="black" stroke-width="2"/>
    <line x1="130" y1="10" x2="140" y2="10" stroke="black" stroke-width="2"/>
    <line x1="130" y1="25" x2="140" y2="25" stroke="black" stroke-width="2"/>
    <line x1="10" y1="130" x2="10" y2="140" stroke="black" stroke-width="2"/>
    <line x1="25" y1="130" x2="25" y2="140" stroke="black" stroke-width="2"/>
    <line x1="130" y1="130" x2="130" y2="140" stroke="black" stroke-width="2"/>
    <line x1="140" y1="130" x2="140" y2="140" stroke="black" stroke-width="2"/>

    <!-- Side length labels -->
    <text x="75" y="-10" text-anchor="middle" font-size="16" fill="black">7 inches</text>
    <text x="-10" y="75" text-anchor="middle" font-size="16" fill="black" transform="rotate(-90, -10, 75)">7 inches</text>

    <!-- Diagonal line -->
    <line id="diagonal" x1="0" y1="0" x2="150" y2="150" stroke="red" stroke-width="2"/>

    <!-- Diagonal label -->
    <text x="160" y="75" text-anchor="start" font-size="16" fill="red">Diagonal</text>
  </g>
</svg>