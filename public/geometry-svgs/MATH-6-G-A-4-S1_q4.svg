<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Rectangular Prism -->
  <g transform="translate(100, 80) scale(1.5)">
    <!-- Back face -->
    <rect x="0" y="0" width="80" height="60" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Front face -->
    <rect x="30" y="20" width="80" height="60" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Top face -->
    <polygon points="0,0 80,0 110,20 30,20" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Right face -->
    <polygon points="80,0 80,60 110,80 110,20" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Left face (hidden, but for completeness of structure) -->
    <polygon points="0,0 30,20 30,80 0,60" fill="#e3f2fd" stroke="black" stroke-width="2" stroke-dasharray="4 2"/>
    <!-- Bottom face (hidden) -->
    <polygon points="0,60 30,80 110,80 80,60" fill="#e3f2fd" stroke="black" stroke-width="2" stroke-dasharray="4 2"/>

    <!-- Labels -->
    <!-- Base width (front) -->
    <line x1="30" y1="80" x2="110" y2="80" stroke="black" stroke-width="2"/>
    <text x="70" y="95" text-anchor="middle" font-size="14">12 inches</text>

    <!-- Base depth (side) -->
    <line x1="110" y1="20" x2="110" y2="80" stroke="black" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" font-size="14" transform="rotate(90 125 50)">8 inches</text>

    <!-- Height (front) -->
    <line x1="110" y1="20" x2="110" y2="80" stroke="black" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" font-size="14" transform="rotate(90 125 50)">6 inches</text>

    <!-- Corrected height label -->
    <line x1="110" y1="20" x2="110" y2="80" stroke="black" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" font-size="14" transform="rotate(90 125 50)">6 inches</text>

    <!-- Corrected base width label -->
    <line x1="30" y1="80" x2="110" y2="80" stroke="black" stroke-width="2"/>
    <text x="70" y="95" text-anchor="middle" font-size="14">12 inches</text>

    <!-- Corrected base depth label -->
    <line x1="80" y1="0" x2="110" y2="20" stroke="black" stroke-width="2"/>
    <text x="120" y="10" text-anchor="middle" font-size="14" transform="rotate(-25 120 10)">8 inches</text>

  </g>
</svg>