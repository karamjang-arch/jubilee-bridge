<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <!-- Rectangular Garden -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="150" height="80" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Length Label -->
    <text x="75" y="-10" text-anchor="middle" font-size="16">15 ft</text>
    <!-- Width Label -->
    <text x="160" y="40" text-anchor="start" font-size="16" transform="rotate(90, 160, 40)">8 ft</text>
    <!-- Equal side marks for width -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="black" stroke-width="2"/>
    <line x1="150" y1="0" x2="150" y2="80" stroke="black" stroke-width="2"/>
    <line x1="-5" y1="40" x2="5" y2="40" stroke="black" stroke-width="2"/>
    <line x1="145" y1="40" x2="155" y2="40" stroke="black" stroke-width="2"/>
    <!-- Equal side marks for length -->
    <line x1="0" y1="0" x2="150" y2="0" stroke="black" stroke-width="2"/>
    <line x1="0" y1="80" x2="150" y2="80" stroke="black" stroke-width="2"/>
    <line x1="75" y1="-5" x2="75" y2="5" stroke="black" stroke-width="2"/>
    <line x1="75" y1="75" x2="75" y2="85" stroke="black" stroke-width="2"/>
  </g>

  <!-- Text explaining the problem -->
  <text x="200" y="50" text-anchor="middle" font-size="14">Rectangular Garden (15 ft x 8 ft)</text>
  <text x="200" y="250" text-anchor="middle" font-size="14">Square Garden (same perimeter)</text>

  <!-- Square Garden (placeholder, calculation not shown in SVG) -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="80" height="80" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Side Label -->
    <text x="40" y="-10" text-anchor="middle" font-size="16">s</text>
    <!-- Equal side marks -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="black" stroke-width="2"/>
    <line x1="80" y1="0" x2="80" y2="80" stroke="black" stroke-width="2"/>
    <line x1="0" y1="0" x2="80" y2="0" stroke="black" stroke-width="2"/>
    <line x1="0" y1="80" x2="80" y2="80" stroke="black" stroke-width="2"/>
    <line x1="-5" y1="40" x2="5" y2="40" stroke="black" stroke-width="2"/>
    <line x1="75" y1="40" x2="85" y2="40" stroke="black" stroke-width="2"/>
    <line x1="40" y1="-5" x2="40" y2="5" stroke="black" stroke-width="2"/>
    <line x1="40" y1="75" x2="40" y2="85" stroke="black" stroke-width="2"/>
  </g>
</svg>