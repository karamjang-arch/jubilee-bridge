<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Triangle PQR -->
  <g transform="translate(50, 150) scale(1.5)">
    <polygon points="0,0 100,0 50,86.6" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Angle P -->
    <path d="M 0 0 L 20 0 L 10 17.32 Z" fill="none" stroke="black" stroke-width="1"/>
    <text x="-25" y="10" font-size="14" fill="black">P = 40°</text>
    <!-- Angle Q -->
    <path d="M 100 0 L 80 0 L 90 17.32 Z" fill="none" stroke="black" stroke-width="1"/>
    <text x="115" y="10" font-size="14" fill="black">Q = 80°</text>
    <!-- Angle R (calculated) -->
    <text x="50" y="105" text-anchor="middle" font-size="14" fill="black">R = 60°</text>
  </g>

  <!-- Triangle STU -->
  <g transform="translate(250, 150) scale(1.5)">
    <polygon points="0,0 100,0 50,86.6" fill="#e3f2fd" stroke="black" stroke-width="2"/>
    <!-- Angle S (corresponding to P) -->
    <text x="-25" y="10" font-size="14" fill="black">S = 40°</text>
    <!-- Angle T (corresponding to Q) -->
    <text x="115" y="10" font-size="14" fill="black">T = 80°</text>
    <!-- Angle U (corresponding to R) -->
    <text x="50" y="105" text-anchor="middle" font-size="14" fill="black">U = 60°</text>
  </g>

  <!-- Problem Statement Text -->
  <text x="200" y="30" text-anchor="middle" font-size="16" font-weight="bold">Similar Triangles PQR and STU</text>
  <text x="200" y="50" text-anchor="middle" font-size="14">Given: ∠P = 40°, ∠Q = 80°</text>
  <text x="200" y="70" text-anchor="middle" font-size="14">Find: ∠U</text>
</svg>