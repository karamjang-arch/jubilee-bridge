<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 50)">
    <!-- Triangle representing the sail -->
    <polygon points="0,0 200,0 100,150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Base measurement -->
    <line x1="0" y1="150" x2="200" y2="150" stroke="black" stroke-width="2"/>
    <text x="100" y="175" text-anchor="middle" font-size="16" fill="black">6 meters</text>

    <!-- Height measurement -->
    <line x1="100" y1="150" x2="100" y2="0" stroke="black" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="120" y="75" text-anchor="start" font-size="16" fill="black">10 meters</text>

    <!-- Right angle marker (assuming the height is perpendicular to the base) -->
    <polygon points="100,150 105,150 105,145" fill="black"/>
  </g>
</svg>