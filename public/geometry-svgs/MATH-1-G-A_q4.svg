<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <g transform="translate(100, 75)">
    <!-- The square frame -->
    <rect x="0" y="0" width="200" height="200" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Equal side marks -->
    <line x1="10" y1="10" x2="30" y2="10" stroke="black" stroke-width="2"/>
    <line x1="10" y1="30" x2="30" y2="30" stroke="black" stroke-width="2"/>
    <line x1="170" y1="10" x2="190" y2="10" stroke="black" stroke-width="2"/>
    <line x1="170" y1="30" x2="190" y2="30" stroke="black" stroke-width="2"/>
    <line x1="10" y1="170" x2="10" y2="190" stroke="black" stroke-width="2"/>
    <line x1="30" y1="170" x2="30" y2="190" stroke="black" stroke-width="2"/>
    <line x1="170" y1="170" x2="170" y2="190" stroke="black" stroke-width="2"/>
    <line x1="190" y1="170" x2="190" y2="190" stroke="black" stroke-width="2"/>

    <!-- Perimeter label -->
    <text x="100" y="-20" text-anchor="middle" font-size="16" font-family="Arial">Perimeter = 36 inches</text>

    <!-- Side length calculation and label -->
    <text x="220" y="100" text-anchor="middle" font-size="16" font-family="Arial">Side = 36 / 4</text>
    <text x="220" y="120" text-anchor="middle" font-size="16" font-family="Arial">= 9 inches</text>

    <!-- Area calculation and label -->
    <text x="100" y="230" text-anchor="middle" font-size="16" font-family="Arial">Area = Side * Side</text>
    <text x="100" y="250" text-anchor="middle" font-size="16" font-family="Arial">= 9 * 9</text>
    <text x="100" y="270" text-anchor="middle" font-size="16" font-family="Arial">= 81 sq inches</text>
  </g>
</svg>