<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 100)">
    <!-- Vertices of the triangle -->
    <polygon points="0,0 120,0 0,90" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Right angle marker -->
    <path d="M 0 0 L 0 20 L 20 0 Z" fill="none" stroke="black" stroke-width="2"/>

    <!-- Side labels -->
    <text x="60" y="-10" text-anchor="middle" font-size="14">120 ft</text>
    <text x="-10" y="45" text-anchor="end" font-size="14">90 ft</text>
    <text x="60" y="110" text-anchor="middle" font-size="14">150 ft</text>
  </g>

  <!-- Problem statement text -->
  <text x="200" y="30" text-anchor="middle" font-size="16" font-weight="bold">Right-Angled Triangle Confirmation</text>
  <text x="200" y="60" text-anchor="middle" font-size="14">Sides: 90 ft, 120 ft, 150 ft</text>
  <text x="200" y="90" text-anchor="middle" font-size="14">Converse of Pythagorean Theorem:</text>
  <text x="200" y="110" text-anchor="middle" font-size="14">a² + b² = c²</text>
  <text x="200" y="130" text-anchor="middle" font-size="14">90² + 120² = 150²</text>
  <text x="200" y="150" text-anchor="middle" font-size="14">8100 + 14400 = 22500</text>
  <text x="200" y="170" text-anchor="middle" font-size="14">22500 = 22500</text>
</svg>