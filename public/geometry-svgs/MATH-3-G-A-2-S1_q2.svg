<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white"/>

  <g transform="translate(100, 50)">
    <!-- The large square -->
    <rect x="0" y="0" width="200" height="200" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Dividing lines -->
    <line x1="100" y1="0" x2="100" y2="200" stroke="black" stroke-width="2"/>
    <line x1="0" y1="100" x2="200" y2="100" stroke="black" stroke-width="2"/>

    <!-- Smaller squares (for visual clarity, not strictly needed for the problem) -->
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="1"/>
    <rect x="100" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="1"/>
    <rect x="0" y="100" width="100" height="100" fill="none" stroke="black" stroke-width="1"/>
    <rect x="100" y="100" width="100" height="100" fill="none" stroke="black" stroke-width="1"/>

    <!-- Equal side marks for the large square -->
    <!-- Top side -->
    <line x1="10" y1="10" x2="10" y2="20" stroke="black" stroke-width="2"/>
    <line x1="190" y1="10" x2="190" y2="20" stroke="black" stroke-width="2"/>
    <line x1="100" y1="10" x2="100" y2="20" stroke="black" stroke-width="2"/>
    <!-- Left side -->
    <line x1="10" y1="10" x2="20" y2="10" stroke="black" stroke-width="2"/>
    <line x1="10" y1="190" x2="20" y2="190" stroke="black" stroke-width="2"/>
    <line x1="10" y1="100" x2="20" y2="100" stroke="black" stroke-width="2"/>

    <!-- Labels for the large square -->
    <text x="100" y="-10" text-anchor="middle" font-size="16" font-family="Arial">8 cm</text>
    <text x="-30" y="100" text-anchor="middle" font-size="16" font-family="Arial" transform="rotate(-90, -30, 100)">8 cm</text>
  </g>
</svg>