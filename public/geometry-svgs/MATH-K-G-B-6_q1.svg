<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="0" height="0" fill="white" />

  <g transform="translate(100, 75)">
    <!-- The original square -->
    <rect id="square" x="0" y="0" width="200" height="200" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- The cut dividing the square -->
    <line x1="0" y1="100" x2="200" y2="100" stroke="black" stroke-width="2"/>

    <!-- Rectangle 1 -->
    <rect id="rect1" x="0" y="0" width="200" height="100" fill="none" stroke="black" stroke-width="2"/>
    <!-- Rectangle 2 -->
    <rect id="rect2" x="0" y="100" width="200" height="100" fill="none" stroke="black" stroke-width="2"/>

    <!-- Labels for the original square side -->
    <text x="-10" y="100" text-anchor="end" font-size="14" dy="0.35em">4 cm</text>
    <text x="100" y="210" text-anchor="middle" font-size="14">4 cm</text>

    <!-- Labels for the rectangle dimensions -->
    <text x="100" y="-10" text-anchor="middle" font-size="14">4 cm</text>
    <text x="-10" y="50" text-anchor="end" font-size="14" dy="0.35em">2 cm</text>
    <text x="-10" y="150" text-anchor="end" font-size="14" dy="0.35em">2 cm</text>
  </g>
</svg>