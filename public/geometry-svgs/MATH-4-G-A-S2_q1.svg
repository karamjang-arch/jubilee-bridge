<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <g transform="translate(100, 100)">
    <!-- Quadrilateral ABCD -->
    <polygon points="0,0 100,0 100,100 0,100" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels -->
    <text x="-20" y="10" font-size="16" fill="black" dominant-baseline="middle">A</text>
    <text x="100" y="-20" font-size="16" fill="black" text-anchor="middle">B</text>
    <text x="120" y="10" font-size="16" fill="black">90°</text>
    <text x="100" y="120" font-size="16" fill="black" text-anchor="middle">C</text>
    <text x="120" y="110" font-size="16" fill="black">90°</text>
    <text x="0" y="120" font-size="16" fill="black" text-anchor="middle">D</text>
    <text x="-20" y="110" font-size="16" fill="black">90°</text>
    <text x="50" y="-20" font-size="16" fill="black" text-anchor="middle">90°</text>

    <!-- Right angle markers -->
    <path d="M 0 0 L 10 0 L 10 10 Z" fill="black" stroke="black" stroke-width="1"/>
    <path d="M 100 0 L 90 0 L 90 10 Z" fill="black" stroke="black" stroke-width="1"/>
    <path d="M 100 100 L 90 100 L 90 90 Z" fill="black" stroke="black" stroke-width="1"/>
    <path d="M 0 100 L 10 100 L 10 90 Z" fill="black" stroke="black" stroke-width="1"/>

  </g>
</svg>