<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <g transform="translate(100, 100)">
    <!-- Triangle vertices -->
    <polygon points="0,0 120,0 0,50" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Right angle marker -->
    <line x1="0" y1="0" x2="10" y2="0" stroke="black" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="black" stroke-width="2"/>

    <!-- Labels -->
    <!-- Hypotenuse label -->
    <text x="60" y="-15" text-anchor="middle" font-size="15">13 cm</text>
    <!-- Leg 1 label -->
    <text x="60" y="25" text-anchor="middle" font-size="15">5 cm</text>
    <!-- Leg 2 label (unknown) -->
    <text x="-25" y="25" text-anchor="middle" font-size="15">x cm</text>
  </g>
</svg>