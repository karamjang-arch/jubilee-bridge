<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <!-- Original Quadrilateral PQRS -->
  <g id="original-quadrilateral">
    <!-- Approximate coordinates for a quadrilateral with an angle Q of 110 degrees -->
    <!-- P: (100, 100) -->
    <!-- Q: (150, 150) -->
    <!-- R: (200, 120) -->
    <!-- S: (130, 70) -->
    <polygon points="100,100 150,150 200,120 130,70" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels for PQRS -->
    <text x="90" y="100" text-anchor="end" font-size="14">P</text>
    <text x="155" y="155" text-anchor="start" font-size="14">Q</text>
    <text x="205" y="120" text-anchor="start" font-size="14">R</text>
    <text x="120" y="60" text-anchor="middle" font-size="14">S</text>

    <!-- Angle Q label -->
    <text x="165" y="145" font-size="14" fill="black">110°</text>
    <!-- Arc to indicate angle Q -->
    <path d="M 140 140 A 20 20 0 0 1 155 150" fill="none" stroke="black" stroke-width="1"/>
  </g>

  <!-- Translated Quadrilateral P'Q'R'S' -->
  <g id="translated-quadrilateral">
    <!-- Translated coordinates (original + 5, -3) -->
    <!-- P': (105, 97) -->
    <!-- Q': (155, 147) -->
    <!-- R': (205, 117) -->
    <!-- S': (135, 67) -->
    <polygon points="105,97 155,147 205,117 135,67" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels for P'Q'R'S' -->
    <text x="95" y="97" text-anchor="end" font-size="14">P'</text>
    <text x="160" y="152" text-anchor="start" font-size="14">Q'</text>
    <text x="210" y="117" text-anchor="start" font-size="14">R'</text>
    <text x="125" y="57" text-anchor="middle" font-size="14">S'</text>

    <!-- Angle Q' label -->
    <text x="170" y="142" font-size="14" fill="black">110°</text>
    <!-- Arc to indicate angle Q' -->
    <path d="M 145 142 A 20 20 0 0 1 155 147" fill="none" stroke="black" stroke-width="1"/>
  </g>

  <!-- Explanation of translation -->
  <line x1="250" y1="100" x2="350" y2="100" stroke="gray" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="250" y="90" font-size="12" fill="gray">5 units right</text>

  <line x1="300" y1="100" x2="300" y2="170" stroke="gray" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="310" y="135" font-size="12" fill="gray">3 units down</text>

  <!-- Arrow definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="gray"/>
    </marker>
  </defs>

</svg>