<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Base Triangle -->
  <polygon points="150,200 250,200 200,129.9" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <!-- Side 1 Label -->
  <text x="200" y="225" text-anchor="middle" font-size="14">6 cm</text>
  <!-- Side 2 Label -->
  <text x="130" y="170" text-anchor="middle" font-size="14">6 cm</text>
  <!-- Side 3 Label -->
  <text x="270" y="170" text-anchor="middle" font-size="14">6 cm</text>

  <!-- Top Triangle (slightly offset for perspective) -->
  <polygon points="175,100 225,100 200,29.9" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Connecting Lines -->
  <line x1="150" y1="200" x2="175" y2="100" stroke="black" stroke-width="2"/>
  <line x1="250" y1="200" x2="225" y2="100" stroke="black" stroke-width="2"/>
  <line x1="200" y1="129.9" x2="200" y2="29.9" stroke="black" stroke-width="2"/>

  <!-- Height Label -->
  <line x1="200" y1="129.9" x2="200" y2="29.9" stroke="red" stroke-dasharray="4 2" stroke-width="2"/>
  <text x="215" y="75" text-anchor="start" font-size="14" fill="red">10 cm</text>

  <!-- Prism Label -->
  <text x="200" y="270" text-anchor="middle" font-size="16" font-weight="bold">Triangular Prism</text>

</svg>