<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Rectangular Prism Representation -->
  <!-- Back face -->
  <polygon points="100,80 180,80 180,140 100,140" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <!-- Front face -->
  <polygon points="150,100 230,100 230,160 150,160" fill="#e3f2fd" stroke="black" stroke-width="2"/>
  <!-- Connecting lines -->
  <line x1="100" y1="80" x2="150" y2="100" stroke="black" stroke-width="2"/>
  <line x1="180" y1="80" x2="230" y2="100" stroke="black" stroke-width="2"/>
  <line x1="180" y1="140" x2="230" y2="160" stroke="black" stroke-width="2"/>
  <line x1="100" y1="140" x2="150" y2="160" stroke="black" stroke-width="2"/>

  <!-- Side face -->
  <polygon points="180,80 230,100 230,160 180,140" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Labels -->
  <!-- Height (3 inches) -->
  <text x="250" y="130" text-anchor="middle" font-size="14" fill="black">3 in</text>
  <line x1="230" y1="100" x2="250" y2="130" stroke="black" stroke-width="1"/>
  <line x1="230" y1="160" x2="250" y2="130" stroke="black" stroke-width="1"/>

  <!-- Width (4 inches) -->
  <text x="180" y="180" text-anchor="middle" font-size="14" fill="black">4 in</text>
  <line x1="150" y1="160" x2="180" y2="180" stroke="black" stroke-width="1"/>
  <line x1="230" y1="160" x2="180" y2="180" stroke="black" stroke-width="1"/>

  <!-- Depth (6 inches) -->
  <text x="125" y="60" text-anchor="middle" font-size="14" fill="black">6 in</text>
  <line x1="100" y1="80" x2="125" y2="60" stroke="black" stroke-width="1"/>
  <line x1="180" y1="80" x2="125" y2="60" stroke="black" stroke-width="1"/>

  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="black">Gift Box Surface Area</text>
</svg>