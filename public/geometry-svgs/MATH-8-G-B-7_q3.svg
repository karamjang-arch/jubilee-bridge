<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="white"/>

  <g transform="translate(100, 150)">
    <!-- Triangle vertices -->
    <polygon points="0,0 0,-120 160,0" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Right angle marker -->
    <line x1="0" y1="0" x2="0" y2="-20" stroke="black" stroke-width="2"/>
    <line x1="0" y1="0" x2="20" y2="0" stroke="black" stroke-width="2"/>

    <!-- Labels -->
    <!-- Leg 1 (vertical) -->
    <text x="-30" y="-60" text-anchor="end" font-size="15" fill="black">9 cm</text>
    <line x1="0" y1="0" x2="0" y2="-120" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Hypotenuse -->
    <text x="80" y="170" text-anchor="middle" font-size="15" fill="black">15 cm</text>
    <line x1="0" y1="0" x2="160" y2="0" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Other leg (horizontal) - This is what we need to find -->
    <text x="80" y="-135" text-anchor="middle" font-size="15" fill="black">?</text>
    <line x1="0" y1="-120" x2="160" y2="0" stroke="black" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
        markerWidth="6" markerHeight="6"
        orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>
</svg>