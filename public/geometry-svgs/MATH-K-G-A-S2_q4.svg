<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="100" y="75" width="200" height="150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Width Label -->
  <text x="80" y="150" text-anchor="end" font-size="16" dy=".3em">Width (w)</text>
  <line x1="100" y1="75" x2="100" y2="225" stroke="black" stroke-width="2"/>
  <line x1="95" y1="75" x2="105" y2="75" stroke="black" stroke-width="2"/>
  <line x1="95" y1="225" x2="105" y2="225" stroke="black" stroke-width="2"/>

  <!-- Length Label -->
  <text x="200" y="245" text-anchor="middle" font-size="16">Length (w + 5)</text>
  <line x1="100" y1="225" x2="300" y2="225" stroke="black" stroke-width="2"/>
  <line x1="100" y1="220" x2="100" y2="230" stroke="black" stroke-width="2"/>
  <line x1="300" y1="220" x2="300" y2="230" stroke="black" stroke-width="2"/>

  <!-- Perimeter Label -->
  <text x="320" y="150" text-anchor="start" font-size="16" dy=".3em">Perimeter = 50 m</text>

  <!-- Right Angle Markers -->
  <line x1="100" y1="75" x2="100" y2="85" stroke="black" stroke-width="2"/>
  <line x1="100" y1="85" x2="110" y2="85" stroke="black" stroke-width="2"/>
  <line x1="100" y1="75" x2="110" y2="75" stroke="black" stroke-width="2"/>

  <line x1="300" y1="75" x2="300" y2="85" stroke="black" stroke-width="2"/>
  <line x1="300" y1="85" x2="290" y2="85" stroke="black" stroke-width="2"/>
  <line x1="300" y1="75" x2="290" y2="75" stroke="black" stroke-width="2"/>

  <line x1="300" y1="225" x2="300" y2="215" stroke="black" stroke-width="2"/>
  <line x1="300" y1="215" x2="290" y2="215" stroke="black" stroke-width="2"/>
  <line x1="300" y1="225" x2="290" y2="225" stroke="black" stroke-width="2"/>

  <line x1="100" y1="225" x2="100" y2="215" stroke="black" stroke-width="2"/>
  <line x1="100" y1="215" x2="110" y2="215" stroke="black" stroke-width="2"/>
  <line x1="100" y1="225" x2="110" y2="225" stroke="black" stroke-width="2"/>

</svg>