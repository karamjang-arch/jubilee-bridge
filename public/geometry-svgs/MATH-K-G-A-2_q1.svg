<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="white"/>

  <g transform="translate(100, 75)">
    <!-- Rectangle representing the window frame -->
    <rect x="0" y="0" width="200" height="120" fill="#e3f2fd" stroke="black" stroke-width="2"/>

    <!-- Labels for side lengths -->
    <!-- Top side -->
    <text x="100" y="-10" text-anchor="middle" font-size="16" fill="black">5 feet</text>
    <!-- Bottom side -->
    <text x="100" y="140" text-anchor="middle" font-size="16" fill="black">5 feet</text>
    <!-- Left side -->
    <text x="-10" y="60" text-anchor="end" font-size="16" fill="black" dominant-baseline="middle">3 feet</text>
    <!-- Right side -->
    <text x="210" y="60" text-anchor="start" font-size="16" fill="black" dominant-baseline="middle">3 feet</text>

    <!-- Optional: Equal side marks for rectangle -->
    <!-- Top and bottom -->
    <line x1="5" y1="5" x2="15" y2="5" stroke="black" stroke-width="1"/>
    <line x1="185" y1="5" x2="195" y2="5" stroke="black" stroke-width="1"/>
    <line x1="5" y1="115" x2="15" y2="115" stroke="black" stroke-width="1"/>
    <line x1="185" y1="115" x2="195" y2="115" stroke="black" stroke-width="1"/>
    <!-- Left and right -->
    <line x1="5" y1="5" x2="5" y2="15" stroke="black" stroke-width="1"/>
    <line x1="5" y1="105" x2="5" y2="115" stroke="black" stroke-width="1"/>
    <line x1="195" y1="5" x2="195" y2="15" stroke="black" stroke-width="1"/>
    <line x1="195" y1="105" x2="195" y2="115" stroke="black" stroke-width="1"/>
  </g>
</svg>