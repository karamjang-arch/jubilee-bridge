<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="400" height="300" fill="white" />

  <!-- Floor Plan Representation -->
  <rect x="100" y="70" width="200" height="150" fill="#e3f2fd" stroke="black" stroke-width="2"/>

  <!-- Side 1 Label (15 feet) -->
  <text x="200" y="235" text-anchor="middle" font-size="16" fill="black">15 feet</text>
  <line x1="100" y1="220" x2="300" y2="220" stroke="black" stroke-width="2"/>

  <!-- Side 2 Label (12 feet) -->
  <text x="85" y="145" text-anchor="end" font-size="16" fill="black">12 feet</text>
  <line x1="115" y1="70" x2="115" y2="220" stroke="black" stroke-width="2"/>

  <!-- Ceiling Height Label -->
  <text x="320" y="145" text-anchor="start" font-size="16" fill="black">9 feet (height)</text>
  <line x1="300" y1="70" x2="300" y2="220" stroke="black" stroke-width="2" stroke-dasharray="4 2"/>

  <!-- Visual cue for height -->
  <line x1="250" y1="70" x2="250" y2="40" stroke="black" stroke-width="2"/>
  <line x1="250" y1="40" x2="300" y2="70" stroke="black" stroke-width="2"/>
  <text x="265" y="30" font-size="14" fill="black">9 ft</text>

</svg>