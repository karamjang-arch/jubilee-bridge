  <!-- Let's use simpler whole numbers for SVG units for clarity, approximating the aspect ratio. -->
  <!-- Let the poster be represented by a rectangle of 360 units width and 240 units height within the 400x300 viewBox. -->
  <!-- This maintains the 3:2 aspect ratio of the poster (36:24). -->
